- name: Ensure worker directories exist
  ansible.windows.win_file:
    path: "{{ item }}"
    state: directory
  loop:
    - "{{ automation_root }}"
    - "{{ automation_root }}\\installers"
    - "{{ repos_root }}"
    - "{{ steam_library_root }}"
    - "{{ runner_root }}"
    - "{{ logs_root }}"
    - "{{ artifacts_root }}"

- name: Enable long paths
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem
    name: LongPathsEnabled
    data: 1
    type: dword

- name: Set worker timezone
  ansible.windows.win_shell: |
    tzutil /s "{{ windows_worker_timezone }}"
  changed_when: false

- name: Disable hibernate
  ansible.windows.win_shell: |
    powercfg /hibernate off
  changed_when: false

- name: Set high performance power plan
  ansible.windows.win_shell: |
    powercfg /setactive SCHEME_MIN
  changed_when: false

- name: Install Chocolatey-managed toolchain packages
  chocolatey.chocolatey.win_chocolatey:
    name: "{{ item }}"
    state: present
  loop: "{{ windows_worker_tool_packages }}"

- name: Install Claude Code into the fixed automation path
  ansible.windows.win_shell: >
    npm.cmd install --prefix "{{ claude_code_root }}" @anthropic-ai/claude-code
  args:
    creates: "{{ claude_cli_path }}"
  when: windows_worker_install_claude_code

- name: Download GitHub Actions runner archive
  ansible.windows.win_get_url:
    url: "{{ github_runner_zip_url }}"
    dest: "{{ github_runner_zip_path }}"
  when: windows_worker_install_github_runner_files

- name: Expand GitHub Actions runner files
  community.windows.win_unzip:
    src: "{{ github_runner_zip_path }}"
    dest: "{{ runner_root }}"
    creates: "{{ github_runner_exe_path }}"
  when: windows_worker_install_github_runner_files

- name: Check whether sts2-modding-mcp already exists
  ansible.windows.win_stat:
    path: "{{ sts2_mcp_root }}\\.git"
  register: sts2_mcp_git_dir
  when: windows_worker_install_sts2_mcp

- name: Clone sts2-modding-mcp
  ansible.windows.win_shell: >
    git clone --branch "{{ sts2_mcp_git_ref }}" "{{ sts2_mcp_repo_url }}" "{{ sts2_mcp_root }}"
  args:
    creates: "{{ sts2_mcp_root }}\\.git"
  when:
    - windows_worker_install_sts2_mcp
    - not sts2_mcp_git_dir.stat.exists

- name: Update sts2-modding-mcp checkout
  ansible.windows.win_shell: |
    git -C "{{ sts2_mcp_root }}" fetch origin
    git -C "{{ sts2_mcp_root }}" checkout "{{ sts2_mcp_git_ref }}"
    git -C "{{ sts2_mcp_root }}" pull --ff-only origin "{{ sts2_mcp_git_ref }}"
  when:
    - windows_worker_install_sts2_mcp
    - sts2_mcp_git_dir.stat.exists

- name: Create sts2-modding-mcp virtual environment
  ansible.windows.win_command: >
    python -m venv "{{ sts2_mcp_root }}\\venv"
  args:
    creates: "{{ sts2_mcp_python_path }}"
  when: windows_worker_install_sts2_mcp

- name: Install sts2-modding-mcp Python requirements
  ansible.windows.win_command: >
    "{{ sts2_mcp_python_path }}" -m pip install -r "{{ sts2_mcp_requirements_path }}"
  when: windows_worker_install_sts2_mcp

- name: Check whether Steam is already installed
  ansible.windows.win_stat:
    path: "{{ steam_exe_path }}"
  register: steam_exe
  when: windows_worker_install_steam_client

- name: Download Steam installer
  ansible.windows.win_get_url:
    url: "{{ steam_installer_url }}"
    dest: "{{ steam_installer_path }}"
  when:
    - windows_worker_install_steam_client
    - not steam_exe.stat.exists

- name: Install Steam client
  ansible.windows.win_package:
    path: "{{ steam_installer_path }}"
    arguments: /S
    state: present
  when:
    - windows_worker_install_steam_client
    - not steam_exe.stat.exists

- name: Check whether Slay the Spire 2 exists at the expected path
  ansible.windows.win_stat:
    path: "{{ sts2_game_dir }}"
  register: sts2_game_dir_stat

- name: Fail when the game is expected but missing
  ansible.builtin.fail:
    msg: "Expected Slay the Spire 2 at {{ sts2_game_dir }}, but the directory does not exist yet."
  when:
    - windows_worker_expect_game_present
    - not sts2_game_dir_stat.stat.exists

- name: Prime sts2-modding-mcp against the current game path
  ansible.windows.win_command: >
    "{{ sts2_mcp_python_path }}" "{{ sts2_mcp_entrypoint }}" --help
  environment:
    STS2_GAME_DIR: "{{ sts2_game_dir }}"
  changed_when: false
  when:
    - windows_worker_install_sts2_mcp
    - sts2_game_dir_stat.stat.exists

- name: Verify GitHub CLI is available
  ansible.windows.win_command: gh --version
  changed_when: false

- name: Verify Azure CLI is available
  ansible.windows.win_command: az version
  changed_when: false

- name: Verify dotnet is available
  ansible.windows.win_command: dotnet --version
  changed_when: false

- name: Verify node is available
  ansible.windows.win_command: node --version
  changed_when: false

- name: Verify Claude Code is available
  ansible.windows.win_command: "{{ claude_cli_path }} --version"
  changed_when: false
  when: windows_worker_install_claude_code
