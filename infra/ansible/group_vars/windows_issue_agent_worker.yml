windows_worker_timezone: "Pacific Standard Time"

automation_root: 'D:\automation'
repos_root: 'D:\repos'
steam_library_root: 'D:\SteamLibrary'
runner_root: 'D:\actions-runner'
logs_root: 'D:\logs'
artifacts_root: 'D:\artifacts'
claude_code_root: 'D:\automation\claude-code'
spirelens_root: 'D:\repos\spirelens'
sts2_mcp_root: 'D:\repos\sts2-modding-mcp'
sts2_game_dir: 'D:\SteamLibrary\steamapps\common\Slay the Spire 2'

windows_worker_install_steam_client: true
windows_worker_expect_game_present: false
windows_worker_install_github_runner_files: true
windows_worker_install_claude_code: true
windows_worker_install_sts2_mcp: true
windows_worker_enable_rdp: false

steam_installer_url: 'https://cdn.cloudflare.steamstatic.com/client/installer/SteamSetup.exe'
steam_installer_path: 'D:\automation\installers\SteamSetup.exe'
steam_exe_path: 'C:\Program Files (x86)\Steam\Steam.exe'

github_runner_version: '2.327.1'
github_runner_zip_url: 'https://github.com/actions/runner/releases/download/v{{ github_runner_version }}/actions-runner-win-x64-{{ github_runner_version }}.zip'
github_runner_zip_path: 'D:\automation\installers\actions-runner-win-x64-{{ github_runner_version }}.zip'
github_runner_exe_path: 'D:\actions-runner\run.cmd'

sts2_mcp_repo_url: 'https://github.com/elliotttate/sts2-modding-mcp.git'
sts2_mcp_git_ref: 'main'
sts2_mcp_python_path: 'D:\repos\sts2-modding-mcp\venv\Scripts\python.exe'
sts2_mcp_requirements_path: 'D:\repos\sts2-modding-mcp\requirements.txt'
sts2_mcp_entrypoint: 'D:\repos\sts2-modding-mcp\run.py'

claude_cli_path: 'D:\automation\claude-code\node_modules\@anthropic-ai\claude-code\bin\claude.exe'

windows_worker_tool_packages:
  - git
  - gh
  - nodejs-lts
  - python
  - azure-cli
  - dotnet-sdk
  - 7zip
