# Template rendered by `.github/workflows/deploy-aks-ansible-control-runner.yml`.
# Keep secrets out of this file; the workflow creates the referenced Kubernetes
# secret in the runner namespace from Azure Key Vault.
githubConfigUrl: "__GITHUB_CONFIG_URL__"
githubConfigSecret: "__GITHUB_CONFIG_SECRET_NAME__"

runnerScaleSetName: "__RUNNER_SCALE_SET_NAME__"
minRunners: __MIN_RUNNERS__
maxRunners: __MAX_RUNNERS__
__RUNNER_GROUP_BLOCK__

template:
  spec:
    terminationGracePeriodSeconds: 30
    containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:latest
        command:
          - /home/runner/run.sh
        env:
          - name: ACTIONS_RUNNER_PRINT_LOG_TO_STDOUT
            value: "1"
        resources:
          requests:
            cpu: "100m"
            memory: "512Mi"
          limits:
            cpu: "1"
            memory: "2Gi"
