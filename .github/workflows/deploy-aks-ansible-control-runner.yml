name: Deploy AKS Ansible Control Runner

on:
  workflow_dispatch:
    inputs:
      aks_resource_group:
        description: Resource group that contains the target AKS cluster
        required: true
        type: string
      aks_cluster_name:
        description: AKS cluster name
        required: true
        default: infra-aks
        type: string
      aks_subscription_id:
        description: Optional subscription override for the AKS cluster and Key Vault lookups
        required: false
        default: ""
        type: string
      aks_use_admin_credentials:
        description: Use AKS admin credentials instead of Entra and kubelogin
        required: true
        default: false
        type: boolean
      aks_use_public_fqdn:
        description: Request the cluster public FQDN when setting kube context
        required: true
        default: false
        type: boolean
      controller_namespace:
        description: Namespace for ARC controller resources
        required: true
        default: arc-systems
        type: string
      runner_namespace:
        description: Namespace for ARC runner scale set resources
        required: true
        default: arc-runners
        type: string
      controller_release_name:
        description: Helm release name for the ARC controller
        required: true
        default: arc
        type: string
      runner_release_name:
        description: Helm release name for the ansible control runner scale set
        required: true
        default: ansible-control
        type: string
      runner_scale_set_name:
        description: Name used by GitHub Actions runs-on for the ARC scale set
        required: true
        default: ansible-control
        type: string
      runner_group:
        description: Optional GitHub runner group for the scale set
        required: false
        default: ""
        type: string
      min_runners:
        description: Minimum idle ARC runners to keep available
        required: true
        default: "0"
        type: string
      max_runners:
        description: Maximum ARC runners to allow
        required: true
        default: "1"
        type: string
      github_app_id_secret_name:
        description: Key Vault secret that stores the GitHub App id
        required: true
        default: card-utility-stats-github-app-id
        type: string
      github_app_installation_id_secret_name:
        description: Key Vault secret that stores the GitHub App installation id
        required: true
        default: card-utility-stats-github-app-installation-id
        type: string
      github_app_private_key_secret_name:
        description: Key Vault secret that stores the GitHub App private key PEM
        required: true
        default: card-utility-stats-github-app-private-key
        type: string
      arc_chart_version:
        description: Pinned ARC chart version
        required: true
        default: 0.14.1
        type: string

concurrency:
  group: deploy-aks-ansible-control-${{ github.event.inputs.aks_cluster_name || 'infra-aks' }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Install or update ARC ansible-control runner
    runs-on: ubuntu-latest

    env:
      AKS_SUBSCRIPTION_ID: ${{ github.event.inputs.aks_subscription_id || vars.KEY_VAULT_SUBSCRIPTION_ID || vars.ARM_SUBSCRIPTION_ID }}
      GITHUB_CONFIG_URL: https://github.com/${{ github.repository }}
      GITHUB_CONFIG_SECRET_NAME: arc-github-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ env.AKS_SUBSCRIPTION_ID }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4.3.0
        with:
          version: v3.18.3

      - name: Install kubelogin
        if: ${{ inputs.aks_use_admin_credentials == false }}
        uses: azure/use-kubelogin@v1
        with:
          kubelogin-version: v0.0.24

      - name: Set AKS context
        uses: azure/aks-set-context@v5
        with:
          resource-group: ${{ inputs.aks_resource_group }}
          cluster-name: ${{ inputs.aks_cluster_name }}
          subscription: ${{ env.AKS_SUBSCRIPTION_ID }}
          admin: ${{ inputs.aks_use_admin_credentials }}
          use-kubelogin: ${{ inputs.aks_use_admin_credentials && 'false' || 'true' }}
          public-fqdn: ${{ inputs.aks_use_public_fqdn }}

      - name: Load GitHub App credentials from Key Vault
        env:
          KEY_VAULT_NAME: ${{ vars.KEY_VAULT_NAME }}
          APP_ID_SECRET_NAME: ${{ inputs.github_app_id_secret_name }}
          APP_INSTALLATION_SECRET_NAME: ${{ inputs.github_app_installation_id_secret_name }}
          APP_PRIVATE_KEY_SECRET_NAME: ${{ inputs.github_app_private_key_secret_name }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${KEY_VAULT_NAME}" ]]; then
            echo "Missing repository variable KEY_VAULT_NAME." >&2
            exit 1
          fi

          github_app_id="$(az keyvault secret show \
            --vault-name "${KEY_VAULT_NAME}" \
            --name "${APP_ID_SECRET_NAME}" \
            --query value \
            --output tsv)"
          github_app_installation_id="$(az keyvault secret show \
            --vault-name "${KEY_VAULT_NAME}" \
            --name "${APP_INSTALLATION_SECRET_NAME}" \
            --query value \
            --output tsv)"
          github_app_private_key="$(az keyvault secret show \
            --vault-name "${KEY_VAULT_NAME}" \
            --name "${APP_PRIVATE_KEY_SECRET_NAME}" \
            --query value \
            --output tsv)"

          if [[ -z "${github_app_id}" || -z "${github_app_installation_id}" || -z "${github_app_private_key}" ]]; then
            echo "One or more GitHub App secrets were empty." >&2
            exit 1
          fi

          echo "::add-mask::${github_app_id}"
          echo "::add-mask::${github_app_installation_id}"

          {
            echo "GITHUB_APP_ID=${github_app_id}"
            echo "GITHUB_APP_INSTALLATION_ID=${github_app_installation_id}"
          } >> "${GITHUB_ENV}"

          private_key_file="${RUNNER_TEMP}/arc-github-app-private-key.pem"
          printf '%s\n' "${github_app_private_key}" > "${private_key_file}"
          chmod 600 "${private_key_file}"
          echo "GITHUB_APP_PRIVATE_KEY_FILE=${private_key_file}" >> "${GITHUB_ENV}"

      - name: Ensure ARC namespaces exist
        shell: bash
        run: |
          set -euo pipefail
          kubectl create namespace "${{ inputs.controller_namespace }}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace "${{ inputs.runner_namespace }}" --dry-run=client -o yaml | kubectl apply -f -

      - name: Install or update ARC controller
        shell: bash
        run: |
          set -euo pipefail

          helm upgrade --install "${{ inputs.controller_release_name }}" \
            --namespace "${{ inputs.controller_namespace }}" \
            --create-namespace \
            --wait \
            --timeout 10m \
            --version "${{ inputs.arc_chart_version }}" \
            oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set-controller

      - name: Create or update ARC GitHub App secret
        shell: bash
        run: |
          set -euo pipefail

          kubectl create secret generic "${GITHUB_CONFIG_SECRET_NAME}" \
            --namespace "${{ inputs.runner_namespace }}" \
            --from-literal=github_app_id="${GITHUB_APP_ID}" \
            --from-literal=github_app_installation_id="${GITHUB_APP_INSTALLATION_ID}" \
            --from-file=github_app_private_key="${GITHUB_APP_PRIVATE_KEY_FILE}" \
            --dry-run=client \
            -o yaml | kubectl apply -f -

      - name: Render ARC runner values
        env:
          RUNNER_SCALE_SET_NAME: ${{ inputs.runner_scale_set_name }}
          RUNNER_GROUP: ${{ inputs.runner_group }}
          MIN_RUNNERS: ${{ inputs.min_runners }}
          MAX_RUNNERS: ${{ inputs.max_runners }}
          RUNNER_VALUES_PATH: ${{ runner.temp }}/ansible-control.values.yaml
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          from pathlib import Path
          import os

          template_path = Path("infra/aks/arc/ansible-control.values.yaml")
          output_path = Path(os.environ["RUNNER_VALUES_PATH"])

          runner_group = os.environ.get("RUNNER_GROUP", "").strip()
          runner_group_block = (
              f'runnerGroup: "{runner_group}"'
              if runner_group
              else "# runnerGroup intentionally unset to use the repository default"
          )

          rendered = template_path.read_text(encoding="utf-8")
          rendered = rendered.replace("__GITHUB_CONFIG_URL__", os.environ["GITHUB_CONFIG_URL"])
          rendered = rendered.replace("__GITHUB_CONFIG_SECRET_NAME__", os.environ["GITHUB_CONFIG_SECRET_NAME"])
          rendered = rendered.replace("__RUNNER_SCALE_SET_NAME__", os.environ["RUNNER_SCALE_SET_NAME"])
          rendered = rendered.replace("__MIN_RUNNERS__", os.environ["MIN_RUNNERS"])
          rendered = rendered.replace("__MAX_RUNNERS__", os.environ["MAX_RUNNERS"])
          rendered = rendered.replace("__RUNNER_GROUP_BLOCK__", runner_group_block)

          output_path.write_text(rendered, encoding="utf-8")
          PY

          cat "${RUNNER_VALUES_PATH}"

      - name: Install or update ARC runner scale set
        env:
          RUNNER_VALUES_PATH: ${{ runner.temp }}/ansible-control.values.yaml
        shell: bash
        run: |
          set -euo pipefail

          helm upgrade --install "${{ inputs.runner_release_name }}" \
            --namespace "${{ inputs.runner_namespace }}" \
            --create-namespace \
            --wait \
            --timeout 10m \
            --version "${{ inputs.arc_chart_version }}" \
            -f "${RUNNER_VALUES_PATH}" \
            oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set

      - name: Summarize ARC deployment
        shell: bash
        run: |
          {
            echo "## AKS ansible control runner"
            echo
            echo "- Cluster: \`${{ inputs.aks_cluster_name }}\`"
            echo "- AKS resource group: \`${{ inputs.aks_resource_group }}\`"
            echo "- Controller namespace: \`${{ inputs.controller_namespace }}\`"
            echo "- Runner namespace: \`${{ inputs.runner_namespace }}\`"
            echo "- Runner scale set name: \`${{ inputs.runner_scale_set_name }}\`"
            echo "- Runner helm release: \`${{ inputs.runner_release_name }}\`"
            if [[ -n "${{ inputs.runner_group }}" ]]; then
              echo "- Runner group: \`${{ inputs.runner_group }}\`"
            fi
            echo
            echo "Next step: run \`Bootstrap Azure Builder via Ansible\` with \`runner_scale_set_name=${{ inputs.runner_scale_set_name }}\`."
            echo
            echo "### Controller pods"
            kubectl get pods -n "${{ inputs.controller_namespace }}"
            echo
            echo "### Runner namespace pods"
            kubectl get pods -n "${{ inputs.runner_namespace }}"
          } >> "${GITHUB_STEP_SUMMARY}"
