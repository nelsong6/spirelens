name: OpenTofu Issue-Agent Screenshot Storage

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/opentofu/issue-agent-screenshot-storage/**'
      - '.github/workflows/opentofu-issue-agent-screenshot-storage.yml'
  push:
    branches: [main]
    paths:
      - 'infra/opentofu/issue-agent-screenshot-storage/**'
      - '.github/workflows/opentofu-issue-agent-screenshot-storage.yml'
  workflow_dispatch:

concurrency:
  group: opentofu-spirelens-issue-agent-screenshot-storage
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  plan-apply:
    name: Plan / Apply screenshot storage
    uses: nelsong6/pipeline-templates/.github/workflows/tofu-plan-apply-template.yml@main
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    with:
      working_directory: infra/opentofu/issue-agent-screenshot-storage
      backend_resource_group: infra
      backend_storage_account: ${{ vars.TFSTATE_STORAGE_ACCOUNT }}
      backend_container: tfstate
      backend_key: spirelens/issue-agent-screenshot-storage.tfstate
      tofu_version: '1.9.0'
      tofu_vars: >-
        -var="location=eastus"
        -var="resource_group_name=rg-spirelens-issue-agent-evidence"
        -var="retention_days=90"
