name: Key Vault Secret Alias

on:
  workflow_dispatch:
    inputs:
      list_only:
        description: List enabled secret names instead of copying a secret
        required: true
        default: true
        type: boolean
      source_secret_name:
        description: Existing Key Vault secret name to copy from
        required: false
        default: ""
        type: string
      target_secret_name:
        description: New Key Vault secret name to create or update
        required: true
        default: spirelens
        type: string
      disable_source:
        description: Disable the source secret after copying
        required: true
        default: false
        type: boolean

jobs:
  alias-secret:
    name: Alias Key Vault secret
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.KEY_VAULT_SUBSCRIPTION_ID || vars.ARM_SUBSCRIPTION_ID }}

      - name: List or copy Key Vault secret
        shell: bash
        env:
          KEY_VAULT_NAME: ${{ vars.KEY_VAULT_NAME }}
          LIST_ONLY: ${{ inputs.list_only }}
          SOURCE_SECRET_NAME: ${{ inputs.source_secret_name }}
          TARGET_SECRET_NAME: ${{ inputs.target_secret_name }}
          DISABLE_SOURCE: ${{ inputs.disable_source }}
        run: |
          set -euo pipefail

          if [[ -z "${KEY_VAULT_NAME}" ]]; then
            echo "Missing repository variable KEY_VAULT_NAME." >&2
            exit 1
          fi

          if [[ "${LIST_ONLY}" == "true" ]]; then
            echo "Enabled secrets in Key Vault '${KEY_VAULT_NAME}':"
            az keyvault secret list \
              --vault-name "${KEY_VAULT_NAME}" \
              --query "[?attributes.enabled].name" \
              --output tsv
            exit 0
          fi

          if [[ -z "${SOURCE_SECRET_NAME}" ]]; then
            echo "source_secret_name is required when list_only is false." >&2
            exit 1
          fi

          if [[ -z "${TARGET_SECRET_NAME}" ]]; then
            echo "target_secret_name is required." >&2
            exit 1
          fi

          secret_value="$(az keyvault secret show \
            --vault-name "${KEY_VAULT_NAME}" \
            --name "${SOURCE_SECRET_NAME}" \
            --query value \
            --output tsv)"

          if [[ -z "${secret_value}" ]]; then
            echo "Source secret '${SOURCE_SECRET_NAME}' was empty or inaccessible." >&2
            exit 1
          fi

          echo "::add-mask::${secret_value}"

          az keyvault secret set \
            --vault-name "${KEY_VAULT_NAME}" \
            --name "${TARGET_SECRET_NAME}" \
            --value "${secret_value}" \
            --output none

          echo "Copied secret '${SOURCE_SECRET_NAME}' to '${TARGET_SECRET_NAME}' in Key Vault '${KEY_VAULT_NAME}'."

          if [[ "${DISABLE_SOURCE}" == "true" && "${SOURCE_SECRET_NAME}" != "${TARGET_SECRET_NAME}" ]]; then
            az keyvault secret set-attributes \
              --vault-name "${KEY_VAULT_NAME}" \
              --name "${SOURCE_SECRET_NAME}" \
              --enabled false \
              --output none
            echo "Disabled source secret '${SOURCE_SECRET_NAME}'."
          fi
