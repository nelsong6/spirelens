name: Issue Agent

run-name: "#${{ github.event.inputs.issue_number }} ${{ github.event.inputs.issue_title }} (${{ github.event.inputs.host }})"

# Glimmung is the entry point. The webhook on glimmung.romaine.life
# receives the GitHub `issues` event, claims a host venue, and fires
# this workflow_dispatch with `lease_id` + `host` (the runner-route
# label) + `issue_number`. The old `issue-agent.yml` lock holder is
# gone; the lock now lives in glimmung's Cosmos `hosts` container.

on:
  workflow_dispatch:
    inputs:
      lease_id:
        description: Glimmung lease ID (ULID).
        required: true
        type: string
      host:
        description: Glimmung host venue (also the runner route label, e.g. issue-agent-runner-nelsonpc-user).
        required: true
        type: string
      issue_number:
        description: Issue number to process.
        required: true
        type: string
      issue_title:
        description: Issue title (informational).
        required: false
        type: string
      gh_event:
        description: Originating GitHub event (informational).
        required: false
        type: string
      gh_action:
        description: Originating GitHub action (informational).
        required: false
        type: string
      # ── Verify-loop / phases-v1 inputs (glimmung#69) ──
      # Glimmung dictates the implementation branch via run_id; the
      # others are reserved for future verify-loop / recycle dispatches
      # (currently unused since pr.enabled=False and verify=False on
      # the spirelens/issue-agent workflow registration).
      run_id:
        description: Glimmung Run ULID (used for branch=glimmung/<run_id>).
        required: false
        type: string
      attempt_index:
        description: 0-based attempt index. 0 = initial; >0 = recycle.
        required: false
        type: string
      prior_verification_artifact_url:
        description: Reserved for verify-loop recycle (unused on this workflow).
        required: false
        type: string
      feedback:
        description: Reserved for PR-feedback recycle (unused on this workflow).
        required: false
        type: string
      pr_number:
        description: Existing PR number on a recycle dispatch.
        required: false
        type: string

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

env:
  ISSUE_AGENT_ARTIFACT_NAME: issue-agent-artifacts
  GLIMMUNG_BASE: https://glimmung.romaine.life
  GLIMMUNG_PROJECT: spirelens

jobs:
  route:
    name: "Verify glimmung lease + resolve runner labels"
    runs-on: ubuntu-latest
    outputs:
      worker_runs_on: ${{ steps.route.outputs.worker_runs_on }}
      route_label: ${{ steps.route.outputs.route_label }}
    steps:
      - name: Verify glimmung lease
        # Capability auth: the lease_id is unguessable, so possessing it is
        # the proof. We assert state=active and host=inputs.host before doing
        # any real work. If verify fails, the workflow exits clean and the
        # host returns to the pool via workflow_run.completed.
        timeout-minutes: 3
        shell: bash
        env:
          GLIMMUNG_BASE: ${{ env.GLIMMUNG_BASE }}
          GLIMMUNG_PROJECT: ${{ env.GLIMMUNG_PROJECT }}
          LEASE_ID: ${{ inputs.lease_id }}
          HOST: ${{ inputs.host }}
        run: |
          set -euo pipefail
          resp=$(curl -fsS "${GLIMMUNG_BASE}/v1/lease/${LEASE_ID}?project=${GLIMMUNG_PROJECT}")
          state=$(printf '%s' "$resp" | jq -r .state)
          host=$(printf '%s' "$resp" | jq -r .host)
          if [[ "$state" != "active" ]]; then
            echo "::error::lease ${LEASE_ID} state=${state} (expected active)"
            exit 1
          fi
          if [[ "$host" != "$HOST" ]]; then
            echo "::error::lease ${LEASE_ID} host=${host} (expected ${HOST})"
            exit 1
          fi
          echo "lease verified: ${LEASE_ID} active on ${HOST}"

      - name: Resolve runner labels
        id: route
        timeout-minutes: 2
        shell: pwsh
        env:
          ROUTE_LABEL_PREFIX: issue-agent-runner-
          WORKER_RUNNER_GROUP: ${{ vars.ISSUE_AGENT_WORKER_RUNNER_GROUP || vars.ISSUE_AGENT_RUNNER_GROUP || '' }}
          ROUTE_LABEL_INPUT: ${{ inputs.host }}
        run: |
          # Glimmung is the lock; it always supplies the route label
          # via inputs.host. We just consume it — no round-robin, no issue
          # labelling, no fallback.
          $routeLabel = [string]$env:ROUTE_LABEL_INPUT
          if ([string]::IsNullOrWhiteSpace($routeLabel)) {
            throw "inputs.host is required (glimmung must supply the route label)."
          }
          if ($routeLabel -notlike "$($env:ROUTE_LABEL_PREFIX)*") {
            throw "Runner route label must start with '$($env:ROUTE_LABEL_PREFIX)': $routeLabel"
          }

          $resolved = @('self-hosted', 'windows', 'issue-agent-worker', $routeLabel)
          if ([string]::IsNullOrWhiteSpace($env:WORKER_RUNNER_GROUP)) {
            $workerRunsOn = $resolved | ConvertTo-Json -Compress
          } else {
            $workerRunsOn = ([ordered]@{ group = $env:WORKER_RUNNER_GROUP; labels = $resolved } | ConvertTo-Json -Compress)
          }

          "route_label=$routeLabel" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8NoBOM -Append
          "worker_runs_on=$workerRunsOn" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8NoBOM -Append
          Write-Host "worker_runs_on=$workerRunsOn"


  claim-issue:
    name: "Mark issue-agent run active"
    needs: route
    if: needs.route.result == 'success'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      ISSUE_NUMBER: ${{ inputs.issue_number }}
      REPO_SLUG: ${{ github.repository }}
    steps:
      - name: Replace queue label with running label
        timeout-minutes: 3
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${ISSUE_NUMBER}" ]; then
            echo "No issue number provided; skipping label claim."
            exit 0
          fi

          if ! gh api "repos/${REPO_SLUG}/labels/issue-agent-running" >/dev/null 2>&1; then
            gh api --method POST "repos/${REPO_SLUG}/labels" \
              -f name='issue-agent-running' \
              -f color='1d76db' \
              -f description='Issue-agent run in progress' >/dev/null || \
              gh api "repos/${REPO_SLUG}/labels/issue-agent-running" >/dev/null
          fi

          issue_labels="$(gh api "repos/${REPO_SLUG}/issues/${ISSUE_NUMBER}/labels" --jq '.[].name')"
          has_issue_label() {
            printf '%s\n' "${issue_labels}" | grep -Fxq "$1"
          }

          if has_issue_label 'issue-agent-running'; then
            echo "Issue #${ISSUE_NUMBER} already has issue-agent-running; leaving it in place."
          else
            gh api --method POST "repos/${REPO_SLUG}/issues/${ISSUE_NUMBER}/labels" \
              -f labels[]='issue-agent-running' >/dev/null
          fi
          if has_issue_label 'issue-agent'; then
            gh api --method DELETE "repos/${REPO_SLUG}/issues/${ISSUE_NUMBER}/labels/issue-agent" >/dev/null
          else
            echo "Issue #${ISSUE_NUMBER} does not have issue-agent; nothing to remove."
          fi

      - name: Comment with run link
        # Posts a single "Issue-agent run started: <run url>" line on the issue
        # so a human watching the issue page can jump to the live run without
        # waiting for the end-of-run summary comment from summarize-issue-agent.
        # Best-effort: if the comment fails, the run still proceeds.
        timeout-minutes: 3
        shell: bash
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          HOST_LABEL: ${{ inputs.host }}
        run: |
          set -euo pipefail
          if [ -z "${ISSUE_NUMBER}" ]; then
            echo "No issue number provided; skipping run-start comment."
            exit 0
          fi
          body="Issue-agent run started: ${RUN_URL} (host: \`${HOST_LABEL}\`)"
          if ! gh api --method POST "repos/${REPO_SLUG}/issues/${ISSUE_NUMBER}/comments" -f "body=${body}" >/dev/null; then
            echo "::warning::Unable to post run-start comment on #${ISSUE_NUMBER}; continuing."
          fi

  test-plan:
    name: "LLM: Plan validation evidence"
    needs:
      - route
    if: needs.route.result == 'success'
    runs-on: ${{ fromJson(needs.route.outputs.worker_runs_on) }}
    env:
      ISSUE_AGENT_CHECKOUT_PATH: issue-agent-src/${{ github.run_id }}-${{ github.run_attempt }}-test-plan
      ISSUE_NUMBER: ${{ inputs.issue_number }}
    outputs:
      phase_status: ${{ steps.test_plan_result.outputs.phase_status }}
      abort_reason: ${{ steps.test_plan_result.outputs.abort_reason }}

    steps:
      - name: Checkout repository
        timeout-minutes: 5
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          path: ${{ env.ISSUE_AGENT_CHECKOUT_PATH }}

      - name: Refresh checkout to latest main
        timeout-minutes: 3
        shell: pwsh
        run: |
          $repoRoot = Join-Path $env:GITHUB_WORKSPACE $env:ISSUE_AGENT_CHECKOUT_PATH
          Set-Location -LiteralPath $repoRoot
          git fetch --prune origin main
          if ($LASTEXITCODE -ne 0) { throw "Unable to fetch latest origin/main." }
          $workBranch = "issue-agent-work/$($env:GITHUB_RUN_ID)-$($env:GITHUB_RUN_ATTEMPT)-test-plan"
          git checkout -B $workBranch origin/main
          if ($LASTEXITCODE -ne 0) { throw "Unable to create issue-agent work branch from latest origin/main." }
          $baseSha = (git rev-parse HEAD).Trim()
          "ISSUE_AGENT_BASE_SHA=$baseSha" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8NoBOM -Append
          "ISSUE_AGENT_WORK_BRANCH=$workBranch" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8NoBOM -Append
          Write-Host "Issue-agent checkout refreshed to origin/main at $baseSha on local branch $workBranch."

      - name: Prepare issue-agent host
        timeout-minutes: 10
        env:
          CONFIGURED_CLAUDE_CLI_PATH: ${{ vars.ISSUE_AGENT_CLAUDE_CLI_PATH }}
          CONFIGURED_STS2_GAME_DIR: ${{ vars.ISSUE_AGENT_STS2_GAME_DIR }}
        shell: pwsh
        run: |
          $scriptPath = Join-Path (Join-Path $env:GITHUB_WORKSPACE $env:ISSUE_AGENT_CHECKOUT_PATH) ".github\scripts\prepare-issue-agent-job.ps1"
          & $scriptPath `
            -CheckoutPath $env:ISSUE_AGENT_CHECKOUT_PATH `
            -InstallMcp `
            -StartSts2

      - name: Build and test baseline main
        timeout-minutes: 8
        shell: pwsh
        run: |
          Set-Location -LiteralPath $env:ISSUE_AGENT_REPO_ROOT
          $sts2DataDir = $env:ISSUE_AGENT_STS2_DATA_DIR
          if ([string]::IsNullOrWhiteSpace($sts2DataDir)) { throw "ISSUE_AGENT_STS2_DATA_DIR was not set." }

          Write-Host '::group::dotnet build SpireLens.csproj (loader)'
          dotnet build "SpireLens.csproj" -c Debug "-p:Sts2DataDir=$sts2DataDir" -p:SkipModsDeploy=true
          Write-Host '::endgroup::'
          if ($LASTEXITCODE -ne 0) { throw "Baseline loader build failed on main." }

          Write-Host '::group::dotnet build SpireLens.Core.csproj'
          dotnet build "Core\SpireLens.Core.csproj" -c Debug "-p:Sts2DataDir=$sts2DataDir" -p:SkipModsDeploy=true
          Write-Host '::endgroup::'
          if ($LASTEXITCODE -ne 0) { throw "Baseline core build failed on main." }

          Write-Host '::group::dotnet build SpireLens.Core.Tests.csproj'
          dotnet build "Tests\SpireLens.Core.Tests\SpireLens.Core.Tests.csproj" -c Debug "-p:Sts2DataDir=$sts2DataDir"
          Write-Host '::endgroup::'
          if ($LASTEXITCODE -ne 0) { throw "Baseline test project build failed on main." }

          Write-Host '::group::dotnet test SpireLens.Core.Tests'
          dotnet test "Tests\SpireLens.Core.Tests\SpireLens.Core.Tests.csproj" -c Debug --no-build "-p:Sts2DataDir=$sts2DataDir"
          Write-Host '::endgroup::'
          if ($LASTEXITCODE -ne 0) { throw "Baseline tests failed on main." }

      - name: Verify Claude subscription auth
        timeout-minutes: 2
        shell: pwsh
        run: |
          & $env:CLAUDE_CLI_PATH auth status
          if ($LASTEXITCODE -ne 0) { throw "Claude Code is not authenticated for the runner user." }

      - name: "LLM: Run test plan phase"
        timeout-minutes: 10
        env:
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          GH_TOKEN: ${{ github.token }}
          REPO_SLUG: ${{ github.repository }}
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:ISSUE_NUMBER)) { throw "No issue number was provided." }
          & (Join-Path $env:ISSUE_AGENT_REPO_ROOT ".github\scripts\run-issue-agent-phases.ps1") `
            -IssueNumber $env:ISSUE_NUMBER `
            -RepoSlug $env:REPO_SLUG `
            -RepoRoot $env:ISSUE_AGENT_REPO_ROOT `
            -ClaudeCliPath $env:CLAUDE_CLI_PATH `
            -McpConfigPath $env:ISSUE_AGENT_MCP_CONFIG_PATH `
            -StreamLogPath (Join-Path $env:RUNNER_TEMP "claude-issue-agent-test-plan-events.jsonl") `
            -DebugLogPath (Join-Path $env:RUNNER_TEMP "claude-issue-agent-test-plan-debug.log") `
            -SummaryLogPath (Join-Path $env:RUNNER_TEMP "claude-issue-agent-test-plan-summary.log") `
            -ScreenshotDir (Join-Path $env:RUNNER_TEMP "sts2-screenshots") `
            -ValidationArtifactDir (Join-Path $env:RUNNER_TEMP "sts2-artifacts") `
            -PhaseName test_plan

      - name: Read test plan result
        id: test_plan_result
        if: always()
        timeout-minutes: 2
        shell: pwsh
        run: |
          $path = Join-Path $env:RUNNER_TEMP "sts2-artifacts\issue-agent-test-plan.json"
          $status = "missing"
          $abortReason = ""
          if (Test-Path -LiteralPath $path) {
            $json = Get-Content -LiteralPath $path -Raw | ConvertFrom-Json
            $status = [string]$json.status
            $abortReason = [string]$json.abort_reason
          }
          "phase_status=$status" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8NoBOM -Append
          "abort_reason=$abortReason" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8NoBOM -Append

      - name: Upload test plan artifacts
        if: always()
        timeout-minutes: 5
        uses: actions/upload-artifact@v4
        with:
          name: issue-agent-test-plan-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/claude-issue-agent-test-plan-*.jsonl
            ${{ runner.temp }}/claude-issue-agent-test-plan-*.log
            ${{ runner.temp }}/sts2-artifacts/issue-agent-test-plan.*
            ${{ runner.temp }}/sts2-artifacts/issue-agent-result.*

      - name: Fail blocked test plan
        if: always() && steps.test_plan_result.outputs.phase_status != 'pass'
        timeout-minutes: 1
        shell: pwsh
        run: |
          throw "Test plan did not pass. status=${{ steps.test_plan_result.outputs.phase_status }} abort_reason=${{ steps.test_plan_result.outputs.abort_reason }}"

  implementation:
    name: "LLM: Implement code change"
    needs:
      - route
    if: needs.route.result == 'success'
    runs-on: ${{ fromJson(needs.route.outputs.worker_runs_on) }}
    env:
      ISSUE_AGENT_CHECKOUT_PATH: issue-agent-src/${{ github.run_id }}-${{ github.run_attempt }}-implementation
      ISSUE_NUMBER: ${{ inputs.issue_number }}
    outputs:
      phase_status: ${{ steps.implementation_result.outputs.phase_status }}
      abort_reason: ${{ steps.implementation_result.outputs.abort_reason }}
      branch_name: ${{ steps.publish_implementation.outputs.branch_name }}
      commit_sha: ${{ steps.publish_implementation.outputs.commit_sha }}

    steps:
      - name: Checkout repository
        timeout-minutes: 5
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          path: ${{ env.ISSUE_AGENT_CHECKOUT_PATH }}

      - name: Refresh checkout to latest main
        timeout-minutes: 3
        shell: pwsh
        run: |
          $repoRoot = Join-Path $env:GITHUB_WORKSPACE $env:ISSUE_AGENT_CHECKOUT_PATH
          Set-Location -LiteralPath $repoRoot
          git fetch --prune origin main
          if ($LASTEXITCODE -ne 0) { throw "Unable to fetch latest origin/main." }
          $workBranch = "issue-agent-work/$($env:GITHUB_RUN_ID)-$($env:GITHUB_RUN_ATTEMPT)-implementation"
          git checkout -B $workBranch origin/main
          if ($LASTEXITCODE -ne 0) { throw "Unable to create issue-agent work branch from latest origin/main." }
          $baseSha = (git rev-parse HEAD).Trim()
          "ISSUE_AGENT_BASE_SHA=$baseSha" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8NoBOM -Append
          "ISSUE_AGENT_WORK_BRANCH=$workBranch" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8NoBOM -Append
          Write-Host "Issue-agent checkout refreshed to origin/main at $baseSha on local branch $workBranch."

      - name: Prepare issue-agent host
        timeout-minutes: 10
        env:
          CONFIGURED_CLAUDE_CLI_PATH: ${{ vars.ISSUE_AGENT_CLAUDE_CLI_PATH }}
          CONFIGURED_STS2_GAME_DIR: ${{ vars.ISSUE_AGENT_STS2_GAME_DIR }}
        shell: pwsh
        run: |
          $scriptPath = Join-Path (Join-Path $env:GITHUB_WORKSPACE $env:ISSUE_AGENT_CHECKOUT_PATH) ".github\scripts\prepare-issue-agent-job.ps1"
          & $scriptPath `
            -CheckoutPath $env:ISSUE_AGENT_CHECKOUT_PATH

      - name: Build and test baseline main
        timeout-minutes: 8
        shell: pwsh
        run: |
          Set-Location -LiteralPath $env:ISSUE_AGENT_REPO_ROOT
          $sts2DataDir = $env:ISSUE_AGENT_STS2_DATA_DIR
          if ([string]::IsNullOrWhiteSpace($sts2DataDir)) { throw "ISSUE_AGENT_STS2_DATA_DIR was not set." }

          Write-Host '::group::dotnet build SpireLens.csproj (loader)'
          dotnet build "SpireLens.csproj" -c Debug "-p:Sts2DataDir=$sts2DataDir" -p:SkipModsDeploy=true
          Write-Host '::endgroup::'
          if ($LASTEXITCODE -ne 0) { throw "Baseline loader build failed on main." }

          Write-Host '::group::dotnet build SpireLens.Core.csproj'
          dotnet build "Core\SpireLens.Core.csproj" -c Debug "-p:Sts2DataDir=$sts2DataDir" -p:SkipModsDeploy=true
          Write-Host '::endgroup::'
          if ($LASTEXITCODE -ne 0) { throw "Baseline core build failed on main." }

          Write-Host '::group::dotnet build SpireLens.Core.Tests.csproj'
          dotnet build "Tests\SpireLens.Core.Tests\SpireLens.Core.Tests.csproj" -c Debug "-p:Sts2DataDir=$sts2DataDir"
          Write-Host '::endgroup::'
          if ($LASTEXITCODE -ne 0) { throw "Baseline test project build failed on main." }

          Write-Host '::group::dotnet test SpireLens.Core.Tests'
          dotnet test "Tests\SpireLens.Core.Tests\SpireLens.Core.Tests.csproj" -c Debug --no-build "-p:Sts2DataDir=$sts2DataDir"
          Write-Host '::endgroup::'
          if ($LASTEXITCODE -ne 0) { throw "Baseline tests failed on main." }

      - name: Verify Claude subscription auth
        timeout-minutes: 2
        shell: pwsh
        run: |
          & $env:CLAUDE_CLI_PATH auth status
          if ($LASTEXITCODE -ne 0) { throw "Claude Code is not authenticated for the runner user." }

      - name: "LLM: Run implementation phase"
        timeout-minutes: 30
        env:
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          GH_TOKEN: ${{ github.token }}
          REPO_SLUG: ${{ github.repository }}
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:ISSUE_NUMBER)) { throw "No issue number was provided." }
          & (Join-Path $env:ISSUE_AGENT_REPO_ROOT ".github\scripts\run-issue-agent-phases.ps1") `
            -IssueNumber $env:ISSUE_NUMBER `
            -RepoSlug $env:REPO_SLUG `
            -RepoRoot $env:ISSUE_AGENT_REPO_ROOT `
            -ClaudeCliPath $env:CLAUDE_CLI_PATH `
            -McpConfigPath $env:ISSUE_AGENT_MCP_CONFIG_PATH `
            -StreamLogPath (Join-Path $env:RUNNER_TEMP "claude-issue-agent-implementation-events.jsonl") `
            -DebugLogPath (Join-Path $env:RUNNER_TEMP "claude-issue-agent-implementation-debug.log") `
            -SummaryLogPath (Join-Path $env:RUNNER_TEMP "claude-issue-agent-implementation-summary.log") `
            -ScreenshotDir (Join-Path $env:RUNNER_TEMP "sts2-screenshots") `
            -ValidationArtifactDir (Join-Path $env:RUNNER_TEMP "sts2-artifacts") `
            -PhaseName implementation

      - name: Read implementation result
        id: implementation_result
        if: always()
        timeout-minutes: 2
        shell: pwsh
        run: |
          $path = Join-Path $env:RUNNER_TEMP "sts2-artifacts\issue-agent-implementation.json"
          $status = "missing"
          $abortReason = ""
          if (Test-Path -LiteralPath $path) {
            $json = Get-Content -LiteralPath $path -Raw | ConvertFrom-Json
            $status = [string]$json.status
            $abortReason = [string]$json.abort_reason
          }
          "phase_status=$status" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8NoBOM -Append
          "abort_reason=$abortReason" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8NoBOM -Append

      - name: Build implementation checkout
        if: steps.implementation_result.outputs.phase_status == 'pass'
        timeout-minutes: 6
        shell: pwsh
        run: |
          Set-Location -LiteralPath $env:ISSUE_AGENT_REPO_ROOT
          $sts2DataDir = $env:ISSUE_AGENT_STS2_DATA_DIR
          if ([string]::IsNullOrWhiteSpace($sts2DataDir)) { throw "ISSUE_AGENT_STS2_DATA_DIR was not set." }

          Write-Host '::group::dotnet build SpireLens.csproj (loader, implementation checkout)'
          dotnet build "SpireLens.csproj" -c Debug "-p:Sts2DataDir=$sts2DataDir" -p:SkipModsDeploy=true
          Write-Host '::endgroup::'
          if ($LASTEXITCODE -ne 0) { throw "Implementation checkout loader build failed." }

          Write-Host '::group::dotnet build SpireLens.Core.csproj (implementation checkout)'
          dotnet build "Core\SpireLens.Core.csproj" -c Debug "-p:Sts2DataDir=$sts2DataDir" -p:SkipModsDeploy=true
          Write-Host '::endgroup::'
          if ($LASTEXITCODE -ne 0) { throw "Implementation checkout core build failed." }

      - name: Push implementation branch
        id: publish_implementation
        if: steps.implementation_result.outputs.phase_status == 'pass'
        timeout-minutes: 6
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GLIMMUNG_RUN_ID: ${{ inputs.run_id }}
        shell: pwsh
        run: |
          Set-Location -LiteralPath $env:ISSUE_AGENT_REPO_ROOT
          function Invoke-Git {
            & git @args
            if ($LASTEXITCODE -ne 0) {
              throw "git $($args -join ' ') failed with exit code $LASTEXITCODE."
            }
          }
          function Normalize-RepoPath {
            param([string]$Path)
            return (([string]$Path).Replace('\/', '/') -replace '[\\/]+', '/')
          }

          $implementationPath = Join-Path $env:RUNNER_TEMP "sts2-artifacts\issue-agent-implementation.json"
          # Branch is glimmung-dictated under glimmung#69: glimmung/<run_id>.
          # Same branch reused across verify-loop retries and PR-feedback
          # recycle dispatches. Glimmung opens the PR after the verification
          # phase ADVANCEs (when pr.enabled=true on the workflow registration).
          if ([string]::IsNullOrWhiteSpace($env:GLIMMUNG_RUN_ID)) {
            throw "missing inputs.run_id (required under glimmung#69)"
          }
          $branch = "glimmung/$($env:GLIMMUNG_RUN_ID)"
          $defaultBranch = if ([string]::IsNullOrWhiteSpace($env:DEFAULT_BRANCH)) { "main" } else { $env:DEFAULT_BRANCH }
          $publishRoot = Join-Path $env:RUNNER_TEMP "issue-agent-publish-$branch"
          $patchPath = Join-Path $env:RUNNER_TEMP "issue-agent-implementation-$branch.patch"

          $blockedChanges = @(Invoke-Git status --short -- .github/workflows .mcp.json | Where-Object { -not [string]::IsNullOrWhiteSpace([string]$_) })
          if ($blockedChanges.Count -gt 0) {
            throw "Implementation phase changed GitHub workflow or runner-local config files, which issue-agent runs cannot publish: $($blockedChanges -join ', ')"
          }

          Invoke-Git add -A -- . ':(exclude).github/workflows/**' ':(exclude).mcp.json'
          $stagedPaths = @(Invoke-Git diff --cached --name-only -- . ':(exclude).github/workflows/**' ':(exclude).mcp.json' | ForEach-Object { Normalize-RepoPath $_ })
          if ($stagedPaths.Count -eq 0) {
            throw "Implementation phase passed but produced no repository changes to commit."
          }
          Invoke-Git diff --cached --binary --output="$patchPath" -- . ':(exclude).github/workflows/**' ':(exclude).mcp.json'

          Invoke-Git fetch origin "+refs/heads/$($defaultBranch):refs/remotes/origin/$($defaultBranch)"
          Invoke-Git worktree add -B $branch $publishRoot "origin/$defaultBranch"
          Invoke-Git -C $publishRoot apply --index --whitespace=nowarn --binary $patchPath
          $stagedPaths = @(Invoke-Git -C $publishRoot diff --cached --name-only | ForEach-Object { Normalize-RepoPath $_ })
          if ($stagedPaths.Count -eq 0) {
            throw "Implementation patch became empty when applied to origin/$defaultBranch."
          }
          $blockedStagedPaths = @($stagedPaths | Where-Object { $_ -like ".github/workflows/*" -or $_ -eq ".mcp.json" })
          if ($blockedStagedPaths.Count -gt 0) {
            throw "Implementation patch unexpectedly staged blocked files: $($blockedStagedPaths -join ', ')"
          }

          if (Test-Path -LiteralPath $implementationPath) {
            $implementation = Get-Content -LiteralPath $implementationPath -Raw | ConvertFrom-Json
            $expectedPaths = @($implementation.changed_files | Where-Object { -not [string]::IsNullOrWhiteSpace([string]$_) })
            if ($expectedPaths.Count -gt 0) {
              $missingPaths = @()
              foreach ($path in $expectedPaths) {
                $normalized = Normalize-RepoPath $path
                if ($normalized -like ".github/workflows/*" -or $normalized -eq ".mcp.json") {
                  throw "Implementation result listed a blocked file, which issue-agent runs cannot publish: $normalized"
                }
                if ($stagedPaths -notcontains $normalized) { $missingPaths += $normalized }
              }
              if ($missingPaths.Count -gt 0) {
                throw "Implementation result listed changed files absent from staged commit: $($missingPaths -join ', ')"
              }
            }
          }

          Invoke-Git -C $publishRoot config user.name "github-actions[bot]"
          Invoke-Git -C $publishRoot config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          Invoke-Git -C $publishRoot commit -m "Issue #$($env:ISSUE_NUMBER) agent changes"
          $commitSha = (Invoke-Git -C $publishRoot rev-parse HEAD).Trim()
          Invoke-Git -C $publishRoot push origin "HEAD:refs/heads/$branch"

          if (Test-Path -LiteralPath $implementationPath) {
            $implementation = Get-Content -LiteralPath $implementationPath -Raw | ConvertFrom-Json
            if ($null -eq $implementation.PSObject.Properties['implementation_branch']) { $implementation | Add-Member -NotePropertyName implementation_branch -NotePropertyValue $null }
            if ($null -eq $implementation.PSObject.Properties['implementation_commit']) { $implementation | Add-Member -NotePropertyName implementation_commit -NotePropertyValue $null }
            $implementation.implementation_branch = $branch
            $implementation.implementation_commit = $commitSha
            $implementation | ConvertTo-Json -Depth 30 | Set-Content -LiteralPath $implementationPath -Encoding utf8NoBOM
          }

          "branch_name=$branch" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8NoBOM -Append
          "commit_sha=$commitSha" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8NoBOM -Append
          Write-Host "Pushed implementation branch: $branch ($commitSha)"

      - name: Upload implementation artifacts
        if: always()
        timeout-minutes: 5
        uses: actions/upload-artifact@v4
        with:
          name: issue-agent-implementation-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/claude-issue-agent-implementation-*.jsonl
            ${{ runner.temp }}/claude-issue-agent-implementation-*.log
            ${{ runner.temp }}/sts2-artifacts/issue-agent-implementation.*
            ${{ runner.temp }}/sts2-artifacts/issue-agent-result.*

      - name: Fail blocked implementation
        if: always() && steps.implementation_result.outputs.phase_status != 'pass'
        timeout-minutes: 1
        shell: pwsh
        run: |
          throw "Implementation did not pass. status=${{ steps.implementation_result.outputs.phase_status }} abort_reason=${{ steps.implementation_result.outputs.abort_reason }}"

  screenshot-storage-outputs:
    name: "Read screenshot storage outputs"
    needs: route
    if: needs.route.result == 'success'
    uses: nelsong6/pipeline-templates/.github/workflows/tofu-outputs-template.yml@main
    permissions:
      contents: read
      id-token: write
    with:
      storage_account: ${{ vars.TFSTATE_STORAGE_ACCOUNT }}
      storage_container: tfstate
      state_key: spirelens/issue-agent-screenshot-storage.tfstate
  verification:
    name: "LLM: Verify in STS2"
    needs:
      - route
      - test-plan
      - implementation
      - screenshot-storage-outputs
    if: needs.route.result == 'success' && needs.test-plan.result == 'success' && needs.implementation.result == 'success' && needs.screenshot-storage-outputs.result == 'success'
    runs-on: ${{ fromJson(needs.route.outputs.worker_runs_on) }}
    env:
      ISSUE_AGENT_CHECKOUT_PATH: issue-agent-src/${{ github.run_id }}-${{ github.run_attempt }}-verification
      ISSUE_NUMBER: ${{ inputs.issue_number }}

    steps:
      - name: Checkout repository
        timeout-minutes: 5
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.implementation.outputs.branch_name }}
          path: ${{ env.ISSUE_AGENT_CHECKOUT_PATH }}

      - name: Attach verification checkout to local work branch
        timeout-minutes: 2
        shell: pwsh
        run: |
          $repoRoot = Join-Path $env:GITHUB_WORKSPACE $env:ISSUE_AGENT_CHECKOUT_PATH
          Set-Location -LiteralPath $repoRoot
          $workBranch = "issue-agent-work/$($env:GITHUB_RUN_ID)-$($env:GITHUB_RUN_ATTEMPT)-verification"
          git checkout -B $workBranch HEAD
          if ($LASTEXITCODE -ne 0) { throw "Unable to create verification work branch from implementation checkout." }
          $baseSha = (git rev-parse HEAD).Trim()
          "ISSUE_AGENT_BASE_SHA=$baseSha" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8NoBOM -Append
          "ISSUE_AGENT_WORK_BRANCH=$workBranch" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8NoBOM -Append
          Write-Host "Issue-agent verification checkout attached at $baseSha on local branch $workBranch."

      - name: Download test plan artifacts
        if: always()
        timeout-minutes: 5
        uses: actions/download-artifact@v4
        with:
          name: issue-agent-test-plan-${{ github.run_id }}
          path: ${{ runner.temp }}/downloaded-test-plan

      - name: Download implementation artifacts
        if: always()
        timeout-minutes: 5
        uses: actions/download-artifact@v4
        with:
          name: issue-agent-implementation-${{ github.run_id }}
          path: ${{ runner.temp }}/downloaded-implementation

      - name: Stage handoff artifacts
        if: always()
        timeout-minutes: 2
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path (Join-Path $env:RUNNER_TEMP "sts2-artifacts") | Out-Null
          Get-ChildItem -Path (Join-Path $env:RUNNER_TEMP "downloaded-test-plan") -Recurse -File -Filter "issue-agent-test-plan.*" -ErrorAction SilentlyContinue |
            Copy-Item -Destination (Join-Path $env:RUNNER_TEMP "sts2-artifacts") -Force
          Get-ChildItem -Path (Join-Path $env:RUNNER_TEMP "downloaded-implementation") -Recurse -File -Filter "issue-agent-implementation.*" -ErrorAction SilentlyContinue |
            Copy-Item -Destination (Join-Path $env:RUNNER_TEMP "sts2-artifacts") -Force


      - name: Prepare issue-agent host
        timeout-minutes: 10
        env:
          CONFIGURED_CLAUDE_CLI_PATH: ${{ vars.ISSUE_AGENT_CLAUDE_CLI_PATH }}
          CONFIGURED_STS2_GAME_DIR: ${{ vars.ISSUE_AGENT_STS2_GAME_DIR }}
        shell: pwsh
        run: |
          $scriptPath = Join-Path (Join-Path $env:GITHUB_WORKSPACE $env:ISSUE_AGENT_CHECKOUT_PATH) ".github\scripts\prepare-issue-agent-job.ps1"
          & $scriptPath `
            -CheckoutPath $env:ISSUE_AGENT_CHECKOUT_PATH `
            -InstallMcp

      - name: Deploy implementation to STS2
        timeout-minutes: 6
        shell: pwsh
        run: |
          Set-Location -LiteralPath $env:ISSUE_AGENT_REPO_ROOT
          $sts2DataDir = $env:ISSUE_AGENT_STS2_DATA_DIR
          if ([string]::IsNullOrWhiteSpace($sts2DataDir)) { throw "ISSUE_AGENT_STS2_DATA_DIR was not set." }

          Write-Host '::group::dotnet build SpireLens.csproj (loader, deploy)'
          dotnet build "SpireLens.csproj" -c Debug "-p:Sts2DataDir=$sts2DataDir"
          Write-Host '::endgroup::'
          if ($LASTEXITCODE -ne 0) { throw "SpireLens loader build/deploy failed." }

          Write-Host '::group::dotnet build SpireLens.Core.csproj (deploy)'
          dotnet build "Core\SpireLens.Core.csproj" -c Debug "-p:Sts2DataDir=$sts2DataDir"
          Write-Host '::endgroup::'
          if ($LASTEXITCODE -ne 0) { throw "SpireLens core build/deploy failed." }

      - name: Prepare STS2 scenario save
        timeout-minutes: 12
        shell: pwsh
        run: |
          & (Join-Path $env:ISSUE_AGENT_REPO_ROOT ".github\scripts\prepare-issue-agent-scenario.ps1") `
            -TestPlanPath (Join-Path $env:RUNNER_TEMP "sts2-artifacts\issue-agent-test-plan.json") `
            -McpConfigPath $env:ISSUE_AGENT_MCP_CONFIG_PATH `
            -RepoRoot $env:ISSUE_AGENT_REPO_ROOT `
            -ValidationArtifactDir (Join-Path $env:RUNNER_TEMP "sts2-artifacts") `
            -IssueNumber $env:ISSUE_NUMBER

      - name: Verify Claude subscription auth
        timeout-minutes: 2
        shell: pwsh
        run: |
          & $env:CLAUDE_CLI_PATH auth status
          if ($LASTEXITCODE -ne 0) { throw "Claude Code is not authenticated for the runner user." }

      - name: "LLM: Run verification phase"
        timeout-minutes: 18
        env:
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          GH_TOKEN: ${{ github.token }}
          REPO_SLUG: ${{ github.repository }}
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:ISSUE_NUMBER)) { throw "No issue number was provided." }
          & (Join-Path $env:ISSUE_AGENT_REPO_ROOT ".github\scripts\run-issue-agent-phases.ps1") `
            -IssueNumber $env:ISSUE_NUMBER `
            -RepoSlug $env:REPO_SLUG `
            -RepoRoot $env:ISSUE_AGENT_REPO_ROOT `
            -ClaudeCliPath $env:CLAUDE_CLI_PATH `
            -McpConfigPath $env:ISSUE_AGENT_MCP_CONFIG_PATH `
            -StreamLogPath (Join-Path $env:RUNNER_TEMP "claude-issue-agent-verification-events.jsonl") `
            -DebugLogPath (Join-Path $env:RUNNER_TEMP "claude-issue-agent-verification-debug.log") `
            -SummaryLogPath (Join-Path $env:RUNNER_TEMP "claude-issue-agent-verification-summary.log") `
            -ScreenshotDir (Join-Path $env:RUNNER_TEMP "sts2-screenshots") `
            -ValidationArtifactDir (Join-Path $env:RUNNER_TEMP "sts2-artifacts") `
            -PhaseName verification

      - name: Read verification result
        id: verification_result
        if: always()
        timeout-minutes: 2
        shell: pwsh
        run: |
          $path = Join-Path $env:RUNNER_TEMP "sts2-artifacts\issue-agent-verification.json"
          $status = "skipped"
          $abortReason = ""
          if (Test-Path -LiteralPath $path) {
            $json = Get-Content -LiteralPath $path -Raw | ConvertFrom-Json
            $status = [string]$json.status
            $abortReason = [string]$json.abort_reason
          }
          # When the verification phase never wrote its own result (status=skipped),
          # the actual blocker is usually a scenario_setup abort from the
          # "Prepare STS2 scenario save" step. Surface that abort_reason here so
          # the terminal pass-gate names the real cause instead of a blank reason.
          if ($status -eq "skipped" -and [string]::IsNullOrWhiteSpace($abortReason)) {
            $setupPath = Join-Path $env:RUNNER_TEMP "sts2-artifacts\issue-agent-scenario-setup.json"
            if (Test-Path -LiteralPath $setupPath) {
              $setup = Get-Content -LiteralPath $setupPath -Raw | ConvertFrom-Json
              if ([string]$setup.status -eq 'abort') {
                $setupReason = [string]$setup.abort_reason
                if (-not [string]::IsNullOrWhiteSpace($setupReason)) {
                  $abortReason = "scenario_setup:$setupReason"
                }
              }
            }
          }
          "phase_status=$status" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8NoBOM -Append
          "abort_reason=$abortReason" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8NoBOM -Append

      - name: Commit verification adjustments to branch
        # Pre-#69, this commit happened inside `Create pull request` along
        # with the gh-pr-create call. Since glimmung opens the PR (when
        # pr.enabled=true), we still need to push any verification-phase
        # adjustments to the implementation branch so the eventual PR diff
        # includes them. The PR-create itself is gone.
        if: steps.verification_result.outputs.phase_status == 'pass'
        timeout-minutes: 3
        shell: pwsh
        run: |
          Set-Location -LiteralPath $env:ISSUE_AGENT_REPO_ROOT
          function Invoke-Git {
            & git @args
            if ($LASTEXITCODE -ne 0) {
              throw "git $($args -join ' ') failed with exit code $LASTEXITCODE."
            }
          }

          $branch = "${{ needs.implementation.outputs.branch_name }}"
          if ([string]::IsNullOrWhiteSpace($branch)) {
            throw "Implementation branch output was empty; verification has nothing to push to."
          }

          $blockedChanges = @(Invoke-Git status --short -- .github/workflows .mcp.json | Where-Object { -not [string]::IsNullOrWhiteSpace([string]$_) })
          if ($blockedChanges.Count -gt 0) {
            throw "Verification produced GitHub workflow or runner-local config changes, which issue-agent runs cannot publish: $($blockedChanges -join ', ')"
          }

          Invoke-Git config user.name "github-actions[bot]"
          Invoke-Git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          $changed = @(Invoke-Git status --porcelain -- . ':(exclude).github/workflows/**' ':(exclude).mcp.json' | Where-Object { -not [string]::IsNullOrWhiteSpace([string]$_) })
          if ($changed.Count -gt 0) {
            Invoke-Git add --all -- . ':(exclude).github/workflows/**' ':(exclude).mcp.json'
            Invoke-Git commit -m "Issue #$($env:ISSUE_NUMBER) verification adjustments"
            Invoke-Git push origin "HEAD:refs/heads/$branch"
          } else {
            Write-Host "No verification adjustments to push."
          }

      - name: Azure login for screenshot publishing
        if: always()
        timeout-minutes: 3
        env:
          AZURE_CONFIG_DIR: ${{ runner.temp }}/azure-issue-agent
        uses: azure/login@v2
        with:
          client-id: ${{ fromJSON(needs.screenshot-storage-outputs.outputs.outputs_json).github_uploader_client_id }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Publish screenshot previews
        if: always()
        timeout-minutes: 5
        env:
          AZURE_CONFIG_DIR: ${{ runner.temp }}/azure-issue-agent
          AZURE_SCREENSHOT_STORAGE_ACCOUNT: ${{ fromJSON(needs.screenshot-storage-outputs.outputs.outputs_json).storage_account_name }}
          AZURE_SCREENSHOT_CONTAINER: ${{ fromJSON(needs.screenshot-storage-outputs.outputs.outputs_json).container_name }}
          AZURE_SCREENSHOT_CONTAINER_URL: ${{ fromJSON(needs.screenshot-storage-outputs.outputs.outputs_json).container_url }}
        shell: pwsh
        run: |
          & (Join-Path $env:ISSUE_AGENT_REPO_ROOT ".github\scripts\publish-issue-agent-screenshots.ps1") `
            -ScreenshotDir (Join-Path $env:RUNNER_TEMP "sts2-screenshots") `
            -PreviewMarkdownPath (Join-Path $env:RUNNER_TEMP "sts2-artifacts\issue-agent-screenshot-previews.md") `
            -StorageAccountName $env:AZURE_SCREENSHOT_STORAGE_ACCOUNT `
            -ContainerName $env:AZURE_SCREENSHOT_CONTAINER `
            -ContainerUrl $env:AZURE_SCREENSHOT_CONTAINER_URL `
            -RunId $env:GITHUB_RUN_ID

      - name: Summarize issue-agent run
        if: always()
        timeout-minutes: 5
        env:
          GH_TOKEN: ${{ github.token }}
          REPO_SLUG: ${{ github.repository }}
          ISSUE_AGENT_SCREENSHOT_PREVIEWS_PATH: ${{ runner.temp }}/sts2-artifacts/issue-agent-screenshot-previews.md
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path (Join-Path $env:RUNNER_TEMP "sts2-artifacts") | Out-Null
          $combinedEvents = Join-Path $env:RUNNER_TEMP "claude-issue-agent-events.jsonl"
          $combinedSummary = Join-Path $env:RUNNER_TEMP "claude-issue-agent-summary.log"
          $combinedDebug = Join-Path $env:RUNNER_TEMP "claude-issue-agent-debug.log"
          Remove-Item -LiteralPath $combinedEvents, $combinedSummary, $combinedDebug -ErrorAction SilentlyContinue

          Get-ChildItem -LiteralPath $env:RUNNER_TEMP -Filter "claude-issue-agent-*-events.jsonl" -File -ErrorAction SilentlyContinue |
            Sort-Object Name |
            ForEach-Object { Get-Content -LiteralPath $_.FullName -ErrorAction SilentlyContinue | Add-Content -LiteralPath $combinedEvents -Encoding utf8NoBOM }
          Get-ChildItem -Path (Join-Path $env:RUNNER_TEMP "downloaded-test-plan"), (Join-Path $env:RUNNER_TEMP "downloaded-implementation") -Recurse -Filter "claude-issue-agent-*-events.jsonl" -File -ErrorAction SilentlyContinue |
            Sort-Object FullName |
            ForEach-Object { Get-Content -LiteralPath $_.FullName -ErrorAction SilentlyContinue | Add-Content -LiteralPath $combinedEvents -Encoding utf8NoBOM }

          Get-ChildItem -LiteralPath $env:RUNNER_TEMP -Filter "claude-issue-agent-*-summary.log" -File -ErrorAction SilentlyContinue |
            Sort-Object Name |
            ForEach-Object { Get-Content -LiteralPath $_.FullName -ErrorAction SilentlyContinue | Add-Content -LiteralPath $combinedSummary -Encoding utf8NoBOM }
          Get-ChildItem -Path (Join-Path $env:RUNNER_TEMP "downloaded-test-plan"), (Join-Path $env:RUNNER_TEMP "downloaded-implementation") -Recurse -Filter "claude-issue-agent-*-summary.log" -File -ErrorAction SilentlyContinue |
            Sort-Object FullName |
            ForEach-Object { Get-Content -LiteralPath $_.FullName -ErrorAction SilentlyContinue | Add-Content -LiteralPath $combinedSummary -Encoding utf8NoBOM }

          Get-ChildItem -LiteralPath $env:RUNNER_TEMP -Filter "claude-issue-agent-*-debug.log" -File -ErrorAction SilentlyContinue |
            Sort-Object Name |
            ForEach-Object { Get-Content -LiteralPath $_.FullName -ErrorAction SilentlyContinue | Add-Content -LiteralPath $combinedDebug -Encoding utf8NoBOM }
          Get-ChildItem -Path (Join-Path $env:RUNNER_TEMP "downloaded-test-plan"), (Join-Path $env:RUNNER_TEMP "downloaded-implementation") -Recurse -Filter "claude-issue-agent-*-debug.log" -File -ErrorAction SilentlyContinue |
            Sort-Object FullName |
            ForEach-Object { Get-Content -LiteralPath $_.FullName -ErrorAction SilentlyContinue | Add-Content -LiteralPath $combinedDebug -Encoding utf8NoBOM }

          & (Join-Path $env:ISSUE_AGENT_REPO_ROOT ".github\scripts\summarize-issue-agent.ps1") `
            -EventLogPath $combinedEvents `
            -SummaryLogPath $combinedSummary `
            -DebugLogPath $combinedDebug `
            -ScreenshotDir (Join-Path $env:RUNNER_TEMP "sts2-screenshots") `
            -ValidationArtifactDir (Join-Path $env:RUNNER_TEMP "sts2-artifacts") `
            -ArtifactName "issue-agent artifacts for run $($env:GITHUB_RUN_ID)" `
            -RepoSlug $env:REPO_SLUG `
            -RunId $env:GITHUB_RUN_ID `
            -IssueNumber $env:ISSUE_NUMBER `
            -HeadSha $env:GITHUB_SHA `
            -RefName $env:GITHUB_REF_NAME

      - name: Upload issue-agent artifacts
        if: always()
        timeout-minutes: 10
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ISSUE_AGENT_ARTIFACT_NAME }}-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/claude-issue-agent-*.jsonl
            ${{ runner.temp }}/claude-issue-agent-*.log
            ${{ runner.temp }}/downloaded-test-plan/**/*
            ${{ runner.temp }}/downloaded-implementation/**/*
            ${{ runner.temp }}/sts2-screenshots/**/*.png
            ${{ runner.temp }}/sts2-artifacts/**/*

      - name: Fail blocked issue-agent run
        if: always() && steps.verification_result.outputs.phase_status != 'pass'
        timeout-minutes: 1
        shell: pwsh
        run: |
          throw "Issue-agent did not reach verified pass. test_plan=${{ needs.test-plan.outputs.phase_status }} implementation=${{ needs.implementation.outputs.phase_status }} verification=${{ steps.verification_result.outputs.phase_status }} verification_reason=${{ steps.verification_result.outputs.abort_reason }}"

  release-issue:
    name: "Release issue-agent running label"
    needs:
      - route
      - claim-issue
      - test-plan
      - implementation
      - screenshot-storage-outputs
      - verification
    if: always() && needs.route.result == 'success'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      ISSUE_NUMBER: ${{ inputs.issue_number }}
      REPO_SLUG: ${{ github.repository }}
    steps:
      - name: Remove running label
        timeout-minutes: 3
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${ISSUE_NUMBER}" ]; then
            echo "No issue number provided; skipping label release."
            exit 0
          fi

          issue_labels="$(gh api "repos/${REPO_SLUG}/issues/${ISSUE_NUMBER}/labels" --jq '.[].name')"
          if printf '%s\n' "${issue_labels}" | grep -Fxq 'issue-agent-running'; then
            gh api --method DELETE "repos/${REPO_SLUG}/issues/${ISSUE_NUMBER}/labels/issue-agent-running" >/dev/null || true
            echo "Removed issue-agent-running from #${ISSUE_NUMBER}."
          else
            echo "Issue #${ISSUE_NUMBER} does not have issue-agent-running; nothing to release."
          fi

  release-glimmung-lease:
    name: "Release glimmung lease"
    needs:
      - route
      - claim-issue
      - test-plan
      - implementation
      - screenshot-storage-outputs
      - verification
      - release-issue
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Release lease
        timeout-minutes: 3
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS -X POST "${{ env.GLIMMUNG_BASE }}/v1/lease/${{ inputs.lease_id }}/release?project=${{ env.GLIMMUNG_PROJECT }}" >/dev/null
