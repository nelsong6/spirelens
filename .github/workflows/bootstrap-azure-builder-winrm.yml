name: Bootstrap Azure Builder WinRM

on:
  workflow_dispatch:
    inputs:
      state_key:
        description: Backend state key inside the Azure Blob container
        required: true
        default: spirelens/azure-vmss-romaine-life.tfstate
        type: string
      resource_group_name:
        description: Optional direct resource group override. Leave blank to read from OpenTofu state.
        required: false
        default: ""
        type: string
      builder_vm_name:
        description: Optional direct builder VM name override. Leave blank to read from OpenTofu state.
        required: false
        default: ""
        type: string

jobs:
  bootstrap:
    name: Enable WinRM on Azure builder VM
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
      ARM_USE_AZUREAD: true
      ARM_USE_OIDC: true
      TF_IN_AUTOMATION: true
      TFSTATE_SUBSCRIPTION_ID: ${{ vars.TFSTATE_SUBSCRIPTION_ID || vars.ARM_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.10.5
          tofu_wrapper: false

      - name: OpenTofu init
        working-directory: infra/opentofu/azure-vmss
        run: |
          tofu init -input=false \
            -backend-config="resource_group_name=infra" \
            -backend-config="subscription_id=${TFSTATE_SUBSCRIPTION_ID}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${{ github.event.inputs.state_key || 'spirelens/azure-vmss-romaine-life.tfstate' }}" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true"

      - name: Resolve builder VM target
        shell: bash
        run: |
          set -euo pipefail

          RESOURCE_GROUP_NAME='${{ github.event.inputs.resource_group_name }}'
          BUILDER_VM_NAME='${{ github.event.inputs.builder_vm_name }}'

          if [[ -z "${RESOURCE_GROUP_NAME}" ]]; then
            RESOURCE_GROUP_NAME="$(tofu -chdir=infra/opentofu/azure-vmss output -raw resource_group_name)"
          fi

          if [[ -z "${BUILDER_VM_NAME}" ]]; then
            BUILDER_VM_NAME="$(tofu -chdir=infra/opentofu/azure-vmss output -raw builder_vm_name)"
          fi

          if [[ -z "${BUILDER_VM_NAME}" || "${BUILDER_VM_NAME}" == "null" ]]; then
            echo "No builder VM was found in the selected state." >&2
            exit 1
          fi

          BUILDER_VM_PUBLIC_IP="$(tofu -chdir=infra/opentofu/azure-vmss output -raw builder_vm_public_ip_address 2>/dev/null || true)"
          BUILDER_VM_PUBLIC_FQDN="$(tofu -chdir=infra/opentofu/azure-vmss output -raw builder_vm_public_fqdn 2>/dev/null || true)"

          {
            echo "RESOURCE_GROUP_NAME=${RESOURCE_GROUP_NAME}"
            echo "BUILDER_VM_NAME=${BUILDER_VM_NAME}"
            echo "BUILDER_VM_PUBLIC_IP=${BUILDER_VM_PUBLIC_IP}"
            echo "BUILDER_VM_PUBLIC_FQDN=${BUILDER_VM_PUBLIC_FQDN}"
          } >> "${GITHUB_ENV}"

      - name: Invoke WinRM bootstrap on builder VM
        shell: bash
        run: |
          set -euo pipefail

          RUN_COMMAND_OUTPUT="$(mktemp)"

          az vm run-command invoke \
            --resource-group "${RESOURCE_GROUP_NAME}" \
            --name "${BUILDER_VM_NAME}" \
            --command-id RunPowerShellScript \
            --scripts @"${GITHUB_WORKSPACE}/ops/windows-worker/Enable-AnsibleWinRm.ps1" \
            > "${RUN_COMMAND_OUTPUT}"

          cat "${RUN_COMMAND_OUTPUT}"

          python - "${RUN_COMMAND_OUTPUT}" <<'PY'
          import json
          import sys

          path = sys.argv[1]
          with open(path, "r", encoding="utf-8") as handle:
              payload = json.load(handle)

          stderr_messages = []
          for item in payload.get("value", []):
              code = item.get("code", "")
              message = (item.get("message") or "").strip()
              if "StdErr" in code and message:
                  stderr_messages.append(message)

          if stderr_messages:
              print("Azure Run Command reported stderr:", file=sys.stderr)
              for message in stderr_messages:
                  print(message, file=sys.stderr)
              sys.exit(1)
          PY

      - name: Summarize builder connectivity details
        shell: bash
        run: |
          {
            echo "## Azure builder WinRM bootstrap"
            echo
            echo "- Resource group: \`${RESOURCE_GROUP_NAME}\`"
            echo "- Builder VM: \`${BUILDER_VM_NAME}\`"
            if [[ -n "${BUILDER_VM_PUBLIC_IP}" ]]; then
              echo "- Public IP: \`${BUILDER_VM_PUBLIC_IP}\`"
            fi
            if [[ -n "${BUILDER_VM_PUBLIC_FQDN}" ]]; then
              echo "- Public FQDN: \`${BUILDER_VM_PUBLIC_FQDN}\`"
            fi
            echo "- Port: \`5986\`"
            echo
            echo "Next step: run the Ansible builder playbook from a Linux or WSL control node that can reach the VM over WinRM."
          } >> "${GITHUB_STEP_SUMMARY}"
