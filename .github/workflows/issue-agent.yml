name: Issue Agent

on:
  issues:
    types:
      - opened
      - reopened
      - labeled
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to hand to Claude
        required: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  run-issue-agent:
    name: Run Claude for one issue
    env:
      ISSUE_AGENT_CHECKOUT_PATH: issue-agent-src/${{ github.run_id }}-${{ github.run_attempt }}
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && (
        (github.event.action == 'labeled' && github.event.label.name == 'issue-agent') ||
        contains(github.event.issue.labels.*.name, 'issue-agent')
      ))
    runs-on:
      - self-hosted
      - windows
      - issue-agent

    steps:
      - name: Prepare issue-agent runner workspace
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          if ([string]::IsNullOrWhiteSpace($workspace)) {
            throw "GITHUB_WORKSPACE is not set."
          }

          $checkoutRoot = Join-Path $workspace "issue-agent-src"
          New-Item -ItemType Directory -Force -Path $checkoutRoot | Out-Null

          function Stop-RunnerBuildProcesses {
            param(
              [Parameter(Mandatory = $true)][string]$WorkspacePath,
              [Parameter(Mandatory = $true)][string]$CheckoutRootPath
            )

            $processIds = New-Object 'System.Collections.Generic.HashSet[int]'
            $hints = @(
              $WorkspacePath,
              $CheckoutRootPath,
              $env:RUNNER_WORKSPACE,
              "issue-agent-build",
              "SpireLens.Core.dll"
            ) | Where-Object { -not [string]::IsNullOrWhiteSpace($_) }

            Get-CimInstance Win32_Process | Where-Object {
              $_.Name -in @('dotnet.exe', 'testhost.exe', 'vstest.console.exe')
            } | ForEach-Object {
              $commandLine = [string]$_.CommandLine
              foreach ($hint in $hints) {
                if ($commandLine -like "*$hint*") {
                  [void]$processIds.Add([int]$_.ProcessId)
                  break
                }
              }
            }

            foreach ($processId in $processIds) {
              try {
                $process = Get-Process -Id $processId -ErrorAction Stop
                Write-Host "Stopping stale runner build process $($process.ProcessName) ($processId)."
                Stop-Process -Id $processId -Force -ErrorAction Stop
              } catch {
                Write-Warning "Unable to stop process ${processId}: $($_.Exception.Message)"
              }
            }

            if ($processIds.Count -gt 0) {
              Start-Sleep -Seconds 3
            }
          }

          Stop-RunnerBuildProcesses -WorkspacePath $workspace -CheckoutRootPath $checkoutRoot

          Get-ChildItem -LiteralPath $checkoutRoot -Directory -ErrorAction SilentlyContinue |
            Where-Object { $_.LastWriteTimeUtc -lt (Get-Date).ToUniversalTime().AddDays(-2) } |
            ForEach-Object {
              try {
                Write-Host "Removing stale checkout folder '$($_.FullName)'."
                Remove-Item -LiteralPath $_.FullName -Recurse -Force -ErrorAction Stop
              } catch {
                Write-Warning "Unable to remove stale checkout folder '$($_.FullName)': $($_.Exception.Message)"
              }
            }

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: ${{ env.ISSUE_AGENT_CHECKOUT_PATH }}

      - name: Resolve issue-agent host paths
        env:
          CONFIGURED_CLAUDE_CLI_PATH: ${{ vars.ISSUE_AGENT_CLAUDE_CLI_PATH }}
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $candidates = @()

          if (-not [string]::IsNullOrWhiteSpace($env:CONFIGURED_CLAUDE_CLI_PATH)) {
            $candidates += $env:CONFIGURED_CLAUDE_CLI_PATH
          }

          $candidates += @(
            'D:\automation\claude-code\node_modules\@anthropic-ai\claude-code\bin\claude.exe',
            'C:\automation\claude-code\node_modules\@anthropic-ai\claude-code\bin\claude.exe',
            (Join-Path $env:USERPROFILE 'automation\claude-code\node_modules\@anthropic-ai\claude-code\bin\claude.exe')
          )

          $claudePath = $candidates |
            Where-Object { -not [string]::IsNullOrWhiteSpace($_) -and (Test-Path -LiteralPath $_) } |
            Select-Object -First 1

          if (-not $claudePath) {
            throw "Claude Code CLI was not found. Set repository variable ISSUE_AGENT_CLAUDE_CLI_PATH or install Claude under one of the documented default locations."
          }

          $repoRoot = Join-Path $env:GITHUB_WORKSPACE $env:ISSUE_AGENT_CHECKOUT_PATH
          if (-not (Test-Path -LiteralPath $repoRoot)) {
            throw "Issue-agent checkout was not found at '$repoRoot'."
          }

          $buildRoot = Join-Path $env:RUNNER_TEMP ("issue-agent-build\$($env:GITHUB_RUN_ID)-$($env:GITHUB_RUN_ATTEMPT)")
          New-Item -ItemType Directory -Force -Path $buildRoot | Out-Null

          "CLAUDE_CLI_PATH=$claudePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ISSUE_AGENT_REPO_ROOT=$repoRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ISSUE_AGENT_BUILD_ROOT=$buildRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Comment issue-agent run link
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
          DISPATCH_ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
          REPO_SLUG: ${{ github.repository }}
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $issueNumber = $env:EVENT_ISSUE_NUMBER
          if ([string]::IsNullOrWhiteSpace($issueNumber)) {
            $issueNumber = $env:DISPATCH_ISSUE_NUMBER
          }
          if ([string]::IsNullOrWhiteSpace($issueNumber)) {
            throw "No issue number was provided by the event or workflow_dispatch input."
          }

          $runUrl = "https://github.com/$($env:REPO_SLUG)/actions/runs/$($env:GITHUB_RUN_ID)"
          gh issue comment $issueNumber --repo $env:REPO_SLUG --body "Issue-agent run started: [$($env:GITHUB_RUN_ID)]($runUrl)"
      - name: Restart STS2 for clean issue-agent baseline
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $repoRoot = $env:ISSUE_AGENT_REPO_ROOT
          if ([string]::IsNullOrWhiteSpace($repoRoot)) {
            $repoRoot = Join-Path $env:GITHUB_WORKSPACE $env:ISSUE_AGENT_CHECKOUT_PATH
          }

          $scriptPath = Join-Path $repoRoot ".github\scripts\restart-sts2.ps1"
          if (-not (Test-Path -LiteralPath $scriptPath)) {
            throw "STS2 restart script was not found at '$scriptPath'."
          }

          & $scriptPath `
            -Mode Restart `
            -McpConfigPath (Join-Path $repoRoot ".mcp.json") `
            -StartupTimeoutSeconds 60 `
            -ShutdownTimeoutSeconds 45

      - name: Load Anthropic API key from local runner file
        env:
          CONFIGURED_ANTHROPIC_KEY_PATH: ${{ vars.ISSUE_AGENT_ANTHROPIC_KEY_PATH }}
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $keyPath = $env:CONFIGURED_ANTHROPIC_KEY_PATH
          if ([string]::IsNullOrWhiteSpace($keyPath)) {
            $keyPath = 'C:\ProgramData\SpireLens\anthropic-api-key.txt'
          }

          if (-not (Test-Path -LiteralPath $keyPath)) {
            throw "Anthropic API key file was not found at '$keyPath'. Run the Key Vault bootstrap script on this runner or set repository variable ISSUE_AGENT_ANTHROPIC_KEY_PATH."
          }

          $anthropicApiKey = (Get-Content -LiteralPath $keyPath -Raw).Trim()
          if ([string]::IsNullOrWhiteSpace($anthropicApiKey)) {
            throw "Anthropic API key file '$keyPath' is empty."
          }

          Write-Host "::add-mask::$anthropicApiKey"
          "ANTHROPIC_API_KEY=$anthropicApiKey" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Run Claude issue agent
        env:
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          GH_TOKEN: ${{ github.token }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
          DISPATCH_ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
          REPO_SLUG: ${{ github.repository }}
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:ANTHROPIC_API_KEY)) {
            throw "ANTHROPIC_API_KEY was not loaded from Azure Key Vault."
          }
          if ([string]::IsNullOrWhiteSpace($env:CLAUDE_CLI_PATH) -or -not (Test-Path -LiteralPath $env:CLAUDE_CLI_PATH)) {
            throw "Claude Code CLI was not found at '$env:CLAUDE_CLI_PATH'. Install it once with: npm.cmd install --prefix D:\automation\claude-code @anthropic-ai/claude-code"
          }

          $issueNumber = $env:EVENT_ISSUE_NUMBER
          if ([string]::IsNullOrWhiteSpace($issueNumber)) {
            $issueNumber = $env:DISPATCH_ISSUE_NUMBER
          }
          if ([string]::IsNullOrWhiteSpace($issueNumber)) {
            throw "No issue number was provided by the event or workflow_dispatch input."
          }

          $repoRoot = $env:ISSUE_AGENT_REPO_ROOT
          if ([string]::IsNullOrWhiteSpace($repoRoot)) {
            $repoRoot = Join-Path $env:GITHUB_WORKSPACE $env:ISSUE_AGENT_CHECKOUT_PATH
          }
          if (-not (Test-Path -LiteralPath $repoRoot)) {
            throw "Issue-agent checkout was not found at '$repoRoot'."
          }

          Set-Location -LiteralPath $repoRoot

          $mcpConfig = Join-Path $repoRoot ".mcp.json"
          if (-not (Test-Path -LiteralPath $mcpConfig)) {
            throw "MCP config was not found at '$mcpConfig'."
          }

          $promptPath = Join-Path $env:RUNNER_TEMP "claude-issue-agent-prompt.md"
          $streamLogPath = Join-Path $env:RUNNER_TEMP "claude-issue-agent-events.jsonl"
          $debugLogPath = Join-Path $env:RUNNER_TEMP "claude-issue-agent-debug.log"
          $summaryLogPath = Join-Path $env:RUNNER_TEMP "claude-issue-agent-summary.log"
          $screenshotDir = Join-Path $env:RUNNER_TEMP "sts2-screenshots"
          $validationArtifactDir = Join-Path $env:RUNNER_TEMP "sts2-artifacts"

          Remove-Item -LiteralPath $streamLogPath, $debugLogPath, $summaryLogPath -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath $screenshotDir, $validationArtifactDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $screenshotDir, $validationArtifactDir | Out-Null

          $env:SCREENSHOT_DIR = $screenshotDir
          $env:VALIDATION_ARTIFACT_DIR = $validationArtifactDir

          $prompt = @"
          You are Claude Code running as the issue agent for $($env:REPO_SLUG) on issue #$issueNumber.

          GitHub Actions triggered this job for issue #$issueNumber. That issue number is authoritative.
          Do not scan for other queued issues, do not choose a different issue, and do not process more than this one issue.

          Read the issue and comments yourself using GitHub CLI:

          ``````
          gh issue view $issueNumber --repo $($env:REPO_SLUG) --comments
          ``````

          You own the result. GitHub Actions is only launching you; there is no queue worker or result parser.

          Clean STS2 baseline policy:
          - The workflow restarts STS2 before launching you and waits for the in-game `SpireLensMcpBridge` HTTP bridge to answer `bridge_ping`.
          - Start from that fresh game process instead of spending time recovering stale GameOver, reward, overlay, or prior-run state.
          - Before live validation, confirm the current state with `bridge_ping` and `bridge_get_full_state`.
          - If the fresh `SpireLensMcpBridge` bridge or game state is not usable, stop and report a blocker instead of improvising side automation.
          - Do not try to kill or restart Slay the Spire 2 yourself; the workflow owns process restart and final cleanup.

          Expectations:
          - Work exactly this issue.
          - Use the local checkout at `$env:ISSUE_AGENT_REPO_ROOT`.
          - Use `gh`, `git`, tests, and MCP tools as needed.
          - For build/test validation on this Windows issue-agent runner, use the repo-native output layout. Do not pass custom `BaseOutputPath`, `BaseIntermediateOutputPath`, `OutputPath`, or `IntermediateOutputPath` properties; this repo's STS2/publicized assembly references are sensitive to those overrides.
          - Use this known-good validation sequence:

            ``````powershell
            $sts2DataDir = "D:\SteamLibrary\steamapps\common\Slay the Spire 2\data_sts2_windows_x86_64"

            dotnet build "Tests\SpireLens.Core.Tests\SpireLens.Core.Tests.csproj" `
              -c Debug `
              "-p:Sts2DataDir=$sts2DataDir"

            dotnet test "Tests\SpireLens.Core.Tests\SpireLens.Core.Tests.csproj" `
              -c Debug `
              --no-build `
              "-p:Sts2DataDir=$sts2DataDir"
            ``````
          - Use the project MCP config at `$mcpConfig`; for live STS2 work, use the `spire-lens-mcp` MCP server. That external MCP server talks to the in-game `SpireLensMcpBridge` mod over localhost:15526.
          - `spire-lens-mcp` is a hard prerequisite for live STS2 work. If it is unavailable, unhealthy, or unusable, stop immediately and report a blocker.
          - All stateful STS2 work must go through approved MCP tools. Do not use raw TCP bridge calls, ad hoc PowerShell bridge scripts, Azure Python imports, Windows API clicking, or other non-MCP workarounds.
          - Use direct MCP/game control. Do not use or debug any legacy filesystem bridge or scenario-request queue.
          - Missing MCP capability is a tooling gap to report, not a reason to invent side automation.
          - After building and deploying SpireLens.Core.dll, explicitly call the MCP `reload_spirelens_core` tool before screenshotting changed SpireLens behavior.
          - If validation needs an active run and the game is at the main menu, use the MCP `start_singleplayer_run` tool, then use `enter_debug_room` when a specific room setup is needed.
          - If `reload_spirelens_core`, `start_singleplayer_run`, or `enter_debug_room` is unavailable or fails, report that as a live-validation blocker. Do not treat a main-menu screenshot as proof of changed tooltip or in-run behavior.
          - Do not use `LiveScenarios/`, `ops/live-worker/`, `scripts/ci/run-live-scenario.ps1`, or any `request.json` / `ready.json` / `accepted.json` / `result.json` workflow.
          - Do not read from or write to `D:\automation\spirelens-live-bridge`.
          - For STS2 issue-agent work, capture screenshot artifacts of the affected card or tooltip states before marking the issue complete.
          - Always include at least one screenshot.
          - Save screenshots to `$screenshotDir` and any extra validation artifacts to `$validationArtifactDir` so the workflow can upload them.
          - If the issue is about a specific card, include at least one screenshot showing that card's stats working in a representative in-run test case.
          - Document the test case used for the screenshot artifacts: what was set up, what was exercised, and what each screenshot is intended to prove.
          - Capture screenshots after the behavior is working, not just during setup.
          - For tooltip-related changes, capture the affected tooltip states and use judgment about which views materially need coverage.
          - If multiple materially distinct views changed, such as compact hand-hover and fuller deck-view tooltip states, capture each affected view when that is the clearest way to prove the change.
          - Use judgment on how many screenshots to include, but do not exceed 10 screenshots for a single issue or pull request.
          - If adequate proof would require more than 10 screenshots, split the work into smaller branches or pull requests instead of overloading one.
          - If screenshot capture is impossible, stop and report the blocker instead of completing the issue without screenshot artifacts.
          - The workflow stops STS2 after the job; you do not need to leave it running for the next issue-agent run.
          - Comment on the issue with what you did, what you observed, and any PR/screenshot/artifact links or paths.
          - In the issue comment and pull request summary, include the test-case summary and the screenshot or artifact links or paths.
          - If you complete the issue, remove `issue-agent` and add `issue-agent-complete`.
          - If you are blocked, comment with the blocker, remove `issue-agent`, and add `issue-agent-blocked`.
          - If you make code changes, create a branch, commit, push, and open a PR.
          - Do not wait for a human continuation unless the issue is genuinely blocked.

          For this validation path, prefer a minimal live STS2 MCP proof over broad code changes.
          If the issue cannot be completed through the current direct GitHub Actions + MCP surface, stop and report that blocker instead of inventing side infrastructure.
          "@
          $prompt | Set-Content -LiteralPath $promptPath -Encoding UTF8
          $promptText = Get-Content -LiteralPath $promptPath -Raw

          "Claude issue agent stream for $($env:REPO_SLUG)#$issueNumber" | Set-Content -LiteralPath $summaryLogPath -Encoding UTF8
          "Sanitized event stream: $streamLogPath" | Add-Content -LiteralPath $summaryLogPath -Encoding UTF8
          "Debug log: $debugLogPath" | Add-Content -LiteralPath $summaryLogPath -Encoding UTF8
          "Screenshot dir: $screenshotDir" | Add-Content -LiteralPath $summaryLogPath -Encoding UTF8
          "Validation artifact dir: $validationArtifactDir" | Add-Content -LiteralPath $summaryLogPath -Encoding UTF8

          function Write-AgentEvent {
            param(
              [Parameter(Mandatory = $true)][string]$Kind,
              [Parameter(Mandatory = $true)][string]$Message,
              [object]$Data = $null
            )

            $record = [ordered]@{
              timestamp = (Get-Date).ToString("o")
              kind = $Kind
              message = $Message
            }
            if ($null -ne $Data) {
              $record.data = $Data
            }

            $json = $record | ConvertTo-Json -Compress -Depth 30
            Add-Content -LiteralPath $streamLogPath -Value $json -Encoding UTF8
            Write-Host "[$Kind] $Message"
          }

          Write-Host "::group::Claude issue agent live stream"
          Write-Host "Launching Claude for $($env:REPO_SLUG)#$issueNumber with stream-json output."
          Write-Host "Sanitized event stream will be saved to: $streamLogPath"
          Write-Host "Debug log will be saved to: $debugLogPath"
          Write-Host "Screenshot dir will be saved to: $screenshotDir"
          Write-Host "Validation artifact dir will be saved to: $validationArtifactDir"
          Write-AgentEvent "start" "Launching Claude for $($env:REPO_SLUG)#$issueNumber."

          & $env:CLAUDE_CLI_PATH `
            -p $promptText `
            --bare `
            --model sonnet `
            --permission-mode bypassPermissions `
            --output-format stream-json `
            --verbose `
            --debug-file $debugLogPath `
            --strict-mcp-config `
            "--mcp-config=$mcpConfig" `
            --max-budget-usd "15.00" `
            --add-dir $repoRoot 2>&1 |
            ForEach-Object {
              $line = [string]$_

              try {
                $event = $line | ConvertFrom-Json -ErrorAction Stop
                if ($event.type -eq "assistant" -and $event.message.content) {
                  foreach ($block in $event.message.content) {
                    if ($block.type -eq "tool_use") {
                      $inputJson = if ($null -ne $block.input) { $block.input | ConvertTo-Json -Compress -Depth 20 } else { "{}" }
                      $message = "$($block.name) $inputJson"
                      Write-AgentEvent "tool_use" $message
                      Add-Content -LiteralPath $summaryLogPath -Value "tool_use: $message" -Encoding UTF8
                    } elseif ($block.type -eq "text" -and -not [string]::IsNullOrWhiteSpace([string]$block.text)) {
                      $text = [string]$block.text
                      if ($text.Length -gt 1000) {
                        $text = $text.Substring(0, 1000) + "... [truncated]"
                      }
                      Write-AgentEvent "assistant_text" $text
                      Add-Content -LiteralPath $summaryLogPath -Value "assistant_text: $text" -Encoding UTF8
                    }
                  }
                } elseif ($event.type -eq "user" -and $event.tool_use_result) {
                  $result = [string]$event.tool_use_result
                  if ($result.Length -gt 600) {
                    $result = $result.Substring(0, 600) + "... [truncated]"
                  }
                  Write-AgentEvent "tool_result" $result
                  Add-Content -LiteralPath $summaryLogPath -Value "tool_result: $result" -Encoding UTF8
                } elseif ($event.type -eq "result") {
                  $resultJson = $event | ConvertTo-Json -Compress -Depth 30
                  Write-AgentEvent "result" $resultJson
                  Add-Content -LiteralPath $summaryLogPath -Value "result: $resultJson" -Encoding UTF8
                } elseif ($event.type -eq "system" -and $event.status) {
                  Write-AgentEvent "status" ([string]$event.status)
                }
              } catch {
                Write-AgentEvent "raw" $line
              }
            }

          $claudeExitCode = $LASTEXITCODE
          Write-Host "::endgroup::"
          "Claude exit code: $claudeExitCode" | Add-Content -LiteralPath $summaryLogPath -Encoding UTF8
          Write-AgentEvent "exit" "Claude exit code: $claudeExitCode"
          if ($claudeExitCode -ne 0) {
            throw "Claude issue agent failed with exit code $claudeExitCode. See $streamLogPath and $debugLogPath."
          }

      - name: Upload Claude agent logs and STS2 validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-issue-agent-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/claude-issue-agent-*.jsonl
            ${{ runner.temp }}/claude-issue-agent-*.log
            ${{ runner.temp }}/sts2-screenshots/**/*.png
            ${{ runner.temp }}/sts2-artifacts/**/*

      - name: Summarize issue-agent run
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
          DISPATCH_ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
          REPO_SLUG: ${{ github.repository }}
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $issueNumber = $env:EVENT_ISSUE_NUMBER
          if ([string]::IsNullOrWhiteSpace($issueNumber)) {
            $issueNumber = $env:DISPATCH_ISSUE_NUMBER
          }

          $repoRoot = $env:ISSUE_AGENT_REPO_ROOT
          if ([string]::IsNullOrWhiteSpace($repoRoot)) {
            $repoRoot = Join-Path $env:GITHUB_WORKSPACE $env:ISSUE_AGENT_CHECKOUT_PATH
          }

          $scriptPath = Join-Path $repoRoot ".github\scripts\summarize-issue-agent.ps1"
          if (-not (Test-Path -LiteralPath $scriptPath)) {
            throw "Issue-agent summary script was not found at '$scriptPath'."
          }

          & $scriptPath `
            -EventLogPath (Join-Path $env:RUNNER_TEMP "claude-issue-agent-events.jsonl") `
            -SummaryLogPath (Join-Path $env:RUNNER_TEMP "claude-issue-agent-summary.log") `
            -DebugLogPath (Join-Path $env:RUNNER_TEMP "claude-issue-agent-debug.log") `
            -ScreenshotDir (Join-Path $env:RUNNER_TEMP "sts2-screenshots") `
            -ValidationArtifactDir (Join-Path $env:RUNNER_TEMP "sts2-artifacts") `
            -ArtifactName "claude-issue-agent-$($env:GITHUB_RUN_ID)" `
            -RepoSlug $env:REPO_SLUG `
            -RunId $env:GITHUB_RUN_ID `
            -IssueNumber $issueNumber `
            -HeadSha $env:GITHUB_SHA `
            -RefName $env:GITHUB_REF_NAME

      - name: Stop STS2 after issue-agent run
        if: always()
        continue-on-error: true
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $repoRoot = $env:ISSUE_AGENT_REPO_ROOT
          if ([string]::IsNullOrWhiteSpace($repoRoot)) {
            $repoRoot = Join-Path $env:GITHUB_WORKSPACE $env:ISSUE_AGENT_CHECKOUT_PATH
          }

          $scriptPath = Join-Path $repoRoot ".github\scripts\restart-sts2.ps1"
          if (-not (Test-Path -LiteralPath $scriptPath)) {
            Write-Warning "STS2 restart script was not found at '$scriptPath'."
            return
          }

          & $scriptPath `
            -Mode Stop `
            -McpConfigPath (Join-Path $repoRoot ".mcp.json") `
            -ShutdownTimeoutSeconds 45
      - name: Stop issue-agent runner build processes
        if: always()
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          if ([string]::IsNullOrWhiteSpace($workspace)) {
            $workspace = "C:\actions-runner-spirelens\_work\spirelens"
          }

          $checkoutRoot = Join-Path $workspace "issue-agent-src"
          $buildRoot = $env:ISSUE_AGENT_BUILD_ROOT

          $hints = @(
            $checkoutRoot,
            $buildRoot,
            "issue-agent-build",
            "SpireLens.Core.dll"
          ) | Where-Object { -not [string]::IsNullOrWhiteSpace($_) }

          Get-CimInstance Win32_Process | Where-Object {
            $_.Name -in @('dotnet.exe', 'testhost.exe', 'vstest.console.exe')
          } | ForEach-Object {
            $commandLine = [string]$_.CommandLine
            foreach ($hint in $hints) {
              if ($commandLine -like "*$hint*") {
                Write-Host "Stopping stale runner build process $($_.Name) ($($_.ProcessId)) after issue-agent run."
                Stop-Process -Id $_.ProcessId -Force -ErrorAction SilentlyContinue
                break
              }
            }
          }
