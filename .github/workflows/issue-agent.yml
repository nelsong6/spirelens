name: Codex Issue Agent

on:
  issues:
    types:
      - opened
      - reopened
      - labeled
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to hand to Claude
        required: true

permissions:
  contents: write
  issues: write
  id-token: write
  pull-requests: write

jobs:
  run-issue-agent:
    name: Run Claude for one issue
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && (
        (github.event.action == 'labeled' && github.event.label.name == 'codex-queue') ||
        contains(github.event.issue.labels.*.name, 'codex-queue')
      ))
    runs-on:
      - self-hosted
      - windows
      - codex-queue

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.KEY_VAULT_SUBSCRIPTION_ID || vars.ARM_SUBSCRIPTION_ID }}

      - name: Load Anthropic API key from Key Vault
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $keyVaultName = '${{ vars.KEY_VAULT_NAME }}'
          $secretName = 'card-utility-stats'

          if ([string]::IsNullOrWhiteSpace($keyVaultName)) {
            throw "Missing repository variable KEY_VAULT_NAME."
          }

          $anthropicApiKey = az keyvault secret show `
            --vault-name $keyVaultName `
            --name $secretName `
            --query value `
            --output tsv

          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($anthropicApiKey)) {
            throw "Unable to load Key Vault secret '$secretName' from vault '$keyVaultName'."
          }

          Write-Host "::add-mask::$anthropicApiKey"
          "ANTHROPIC_API_KEY=$anthropicApiKey" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Verify Claude and MCP
        env:
          CLAUDE_CLI_PATH: D:\automation\claude-code\node_modules\@anthropic-ai\claude-code\bin\claude.exe
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:ANTHROPIC_API_KEY)) {
            throw "ANTHROPIC_API_KEY was not loaded from Azure Key Vault."
          }
          if ([string]::IsNullOrWhiteSpace($env:CLAUDE_CLI_PATH) -or -not (Test-Path -LiteralPath $env:CLAUDE_CLI_PATH)) {
            throw "Claude Code CLI was not found at '$env:CLAUDE_CLI_PATH'. Install it once with: npm.cmd install --prefix D:\automation\claude-code @anthropic-ai/claude-code"
          }

          $mcpConfig = Join-Path $env:GITHUB_WORKSPACE ".mcp.json"
          if (-not (Test-Path -LiteralPath $mcpConfig)) {
            throw "MCP config was not found at '$mcpConfig'."
          }

          & $env:CLAUDE_CLI_PATH --version
          & $env:CLAUDE_CLI_PATH "--mcp-config=$mcpConfig" mcp list

      - name: Run Claude issue agent
        env:
          CLAUDE_CLI_PATH: D:\automation\claude-code\node_modules\@anthropic-ai\claude-code\bin\claude.exe
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          GH_TOKEN: ${{ github.token }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
          DISPATCH_ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
          REPO_SLUG: ${{ github.repository }}
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $issueNumber = $env:EVENT_ISSUE_NUMBER
          if ([string]::IsNullOrWhiteSpace($issueNumber)) {
            $issueNumber = $env:DISPATCH_ISSUE_NUMBER
          }
          if ([string]::IsNullOrWhiteSpace($issueNumber)) {
            throw "No issue number was provided by the event or workflow_dispatch input."
          }

          $mcpConfig = Join-Path $env:GITHUB_WORKSPACE ".mcp.json"
          $promptPath = Join-Path $env:RUNNER_TEMP "claude-issue-agent-prompt.md"
          $streamLogPath = Join-Path $env:RUNNER_TEMP "claude-issue-agent-events.jsonl"
          $debugLogPath = Join-Path $env:RUNNER_TEMP "claude-issue-agent-debug.log"
          $summaryLogPath = Join-Path $env:RUNNER_TEMP "claude-issue-agent-summary.log"
          $prompt = @"
          You are Claude Code running as the issue agent for $($env:REPO_SLUG) on issue #$issueNumber.

          GitHub Actions triggered this job for issue #$issueNumber. That issue number is authoritative.
          Do not scan for other queued issues, do not choose a different issue, and do not process more than this one issue.

          Read the issue and comments yourself using GitHub CLI:

          ``````
          gh issue view $issueNumber --repo $($env:REPO_SLUG) --comments
          ``````

          You own the result. GitHub Actions is only launching you; there is no queue worker or result parser.

          Expectations:
          - Work exactly this issue.
          - Use the local checkout at `$env:GITHUB_WORKSPACE`.
          - Use `gh`, `git`, tests, and MCP tools as needed.
          - Use the project MCP config at `$mcpConfig`; for live STS2 work, use the `sts2-modding` MCP server.
          - Use direct MCP/game control. Do not use or debug any legacy filesystem bridge or scenario-request queue.
          - Do not use `LiveScenarios/`, `ops/live-worker/`, `scripts/ci/run-live-scenario.ps1`, or any `request.json` / `ready.json` / `accepted.json` / `result.json` workflow.
          - Do not read from or write to `D:\automation\card-utility-stats-live-bridge`.
          - Comment on the issue with what you did, what you observed, and any PR/screenshot/artifact links or paths.
          - If you complete the issue, remove `codex-queue` and add `codex-complete`.
          - If you are blocked, comment with the blocker, remove `codex-queue`, and add `codex-blocked`.
          - If you make code changes, create a branch, commit, push, and open a PR.
          - Do not wait for a human continuation unless the issue is genuinely blocked.

          For this validation path, prefer a minimal live STS2 MCP proof over broad code changes.
          If the issue cannot be completed through the current direct GitHub Actions + MCP surface, stop and report that blocker instead of inventing side infrastructure.
          "@
          $prompt | Set-Content -LiteralPath $promptPath -Encoding UTF8
          $promptText = Get-Content -LiteralPath $promptPath -Raw

          Remove-Item -LiteralPath $streamLogPath, $debugLogPath, $summaryLogPath -ErrorAction SilentlyContinue
          "Claude issue agent stream for $($env:REPO_SLUG)#$issueNumber" | Set-Content -LiteralPath $summaryLogPath -Encoding UTF8
          "Sanitized event stream: $streamLogPath" | Add-Content -LiteralPath $summaryLogPath -Encoding UTF8
          "Debug log: $debugLogPath" | Add-Content -LiteralPath $summaryLogPath -Encoding UTF8

          function Write-AgentEvent {
            param(
              [Parameter(Mandatory = $true)][string]$Kind,
              [Parameter(Mandatory = $true)][string]$Message,
              [object]$Data = $null
            )

            $record = [ordered]@{
              timestamp = (Get-Date).ToString("o")
              kind = $Kind
              message = $Message
            }
            if ($null -ne $Data) {
              $record.data = $Data
            }

            $json = $record | ConvertTo-Json -Compress -Depth 30
            Add-Content -LiteralPath $streamLogPath -Value $json -Encoding UTF8
            Write-Host "[$Kind] $Message"
          }

          Write-Host "::group::Claude issue agent live stream"
          Write-Host "Launching Claude for $($env:REPO_SLUG)#$issueNumber with stream-json output."
          Write-Host "Sanitized event stream will be saved to: $streamLogPath"
          Write-Host "Debug log will be saved to: $debugLogPath"
          Write-AgentEvent "start" "Launching Claude for $($env:REPO_SLUG)#$issueNumber."

          & $env:CLAUDE_CLI_PATH `
            -p $promptText `
            --bare `
            --model sonnet `
            --permission-mode bypassPermissions `
            --output-format stream-json `
            --verbose `
            --debug-file $debugLogPath `
            --strict-mcp-config `
            "--mcp-config=$mcpConfig" `
            --max-budget-usd "15.00" `
            --add-dir $env:GITHUB_WORKSPACE 2>&1 |
            ForEach-Object {
              $line = [string]$_

              try {
                $event = $line | ConvertFrom-Json -ErrorAction Stop
                if ($event.type -eq "assistant" -and $event.message.content) {
                  foreach ($block in $event.message.content) {
                    if ($block.type -eq "tool_use") {
                      $inputJson = if ($null -ne $block.input) { $block.input | ConvertTo-Json -Compress -Depth 20 } else { "{}" }
                      $message = "$($block.name) $inputJson"
                      Write-AgentEvent "tool_use" $message
                      Add-Content -LiteralPath $summaryLogPath -Value "tool_use: $message" -Encoding UTF8
                    } elseif ($block.type -eq "text" -and -not [string]::IsNullOrWhiteSpace([string]$block.text)) {
                      $text = [string]$block.text
                      if ($text.Length -gt 1000) {
                        $text = $text.Substring(0, 1000) + "... [truncated]"
                      }
                      Write-AgentEvent "assistant_text" $text
                      Add-Content -LiteralPath $summaryLogPath -Value "assistant_text: $text" -Encoding UTF8
                    }
                  }
                } elseif ($event.type -eq "user" -and $event.tool_use_result) {
                  $result = [string]$event.tool_use_result
                  if ($result.Length -gt 600) {
                    $result = $result.Substring(0, 600) + "... [truncated]"
                  }
                  Write-AgentEvent "tool_result" $result
                  Add-Content -LiteralPath $summaryLogPath -Value "tool_result: $result" -Encoding UTF8
                } elseif ($event.type -eq "result") {
                  $resultJson = $event | ConvertTo-Json -Compress -Depth 30
                  Write-AgentEvent "result" $resultJson
                  Add-Content -LiteralPath $summaryLogPath -Value "result: $resultJson" -Encoding UTF8
                } elseif ($event.type -eq "system" -and $event.status) {
                  Write-AgentEvent "status" ([string]$event.status)
                }
              } catch {
                Write-AgentEvent "raw" $line
              }
            }

          $claudeExitCode = $LASTEXITCODE
          Write-Host "::endgroup::"
          "Claude exit code: $claudeExitCode" | Add-Content -LiteralPath $summaryLogPath -Encoding UTF8
          Write-AgentEvent "exit" "Claude exit code: $claudeExitCode"
          if ($claudeExitCode -ne 0) {
            throw "Claude issue agent failed with exit code $claudeExitCode. See $streamLogPath and $debugLogPath."
          }

      - name: Upload Claude agent logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-issue-agent-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/claude-issue-agent-*.jsonl
            ${{ runner.temp }}/claude-issue-agent-*.log
