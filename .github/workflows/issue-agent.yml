name: Issue Agent

run-name: Issue Agent Lock #${{ github.event.issue.number }}

on:
  issues:
    types:
      - reopened
      - labeled

permissions:
  actions: write
  contents: read
  issues: write

jobs:
  route:
    name: "Route issue-agent lock"
    if: |
      (github.event.action == 'labeled' && github.event.label.name == 'issue-agent') ||
      (github.event.action == 'reopened' && contains(github.event.issue.labels.*.name, 'issue-agent'))
    runs-on: ubuntu-latest
    outputs:
      route_label: ${{ steps.route.outputs.route_label }}
      lock_runs_on: ${{ steps.route.outputs.lock_runs_on }}
    steps:
      - name: Resolve lock runner label
        id: route
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO_SLUG: ${{ github.repository }}
          ROUTE_LABEL_PREFIX: issue-agent-runner-
          ROUTE_LABEL_POOL: ${{ vars.ISSUE_AGENT_ROUTE_LABEL_POOL || 'issue-agent-runner-nelsonlaptop,issue-agent-runner-nelsonpc-user' }}
          LOCK_RUNNER_GROUP: ${{ vars.ISSUE_AGENT_LOCK_RUNNER_GROUP || vars.ISSUE_AGENT_RUNNER_GROUP || '' }}
          ISSUE_LABELS_JSON: ${{ toJSON(github.event.issue.labels.*.name) }}
        run: |
          $issueLabels = @()
          if (-not [string]::IsNullOrWhiteSpace($env:ISSUE_LABELS_JSON) -and $env:ISSUE_LABELS_JSON -ne 'null') {
            $issueLabels = @($env:ISSUE_LABELS_JSON | ConvertFrom-Json)
          }

          $routeLabels = @($issueLabels | Where-Object { [string]$_ -like "$($env:ROUTE_LABEL_PREFIX)*" })
          if ($routeLabels.Count -gt 1) {
            throw "Expected at most one $($env:ROUTE_LABEL_PREFIX)* issue label before adding issue-agent, found: $($routeLabels -join ', ')"
          }

          $routeLabel = ""
          if ($routeLabels.Count -eq 1) {
            $routeLabel = [string]$routeLabels[0]
          } else {
            $routePool = @(
              $env:ROUTE_LABEL_POOL -split ',' |
                ForEach-Object { [string]$_.Trim() } |
                Where-Object { -not [string]::IsNullOrWhiteSpace($_) }
            )
            if ($routePool.Count -eq 0) {
              throw "ISSUE_AGENT_ROUTE_LABEL_POOL must contain at least one $($env:ROUTE_LABEL_PREFIX)* label."
            }
            $invalidRouteLabels = @($routePool | Where-Object { [string]$_ -notlike "$($env:ROUTE_LABEL_PREFIX)*" })
            if ($invalidRouteLabels.Count -gt 0) {
              throw "ISSUE_AGENT_ROUTE_LABEL_POOL entries must start with '$($env:ROUTE_LABEL_PREFIX)': $($invalidRouteLabels -join ', ')"
            }

            $issueNumber = [int]$env:ISSUE_NUMBER
            $routeLabel = [string]$routePool[$issueNumber % $routePool.Count]

            function Test-GhApi {
              param([string]$Path)
              & gh api $Path *> $null
              return $LASTEXITCODE -eq 0
            }

            $routeSuffixForLabel = $routeLabel.Substring($env:ROUTE_LABEL_PREFIX.Length)
            if (-not (Test-GhApi "repos/$($env:REPO_SLUG)/labels/$routeLabel")) {
              & gh api --method POST "repos/$($env:REPO_SLUG)/labels" `
                -f "name=$routeLabel" `
                -f "color=1d76db" `
                -f "description=Route issue-agent workflow to $routeSuffixForLabel" *> $null
              if ($LASTEXITCODE -ne 0 -and -not (Test-GhApi "repos/$($env:REPO_SLUG)/labels/$routeLabel")) {
                throw "Failed to create route label '$routeLabel'."
              }
            }

            & gh api --method POST "repos/$($env:REPO_SLUG)/issues/$($env:ISSUE_NUMBER)/labels" `
              -f "labels[]=$routeLabel" *> $null
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to apply route label '$routeLabel' to issue #$($env:ISSUE_NUMBER)."
            }
            Write-Host "Auto-selected route_label=$routeLabel from ISSUE_AGENT_ROUTE_LABEL_POOL."
          }

          if ([string]::IsNullOrWhiteSpace($routeLabel) -or $routeLabel -notlike "$($env:ROUTE_LABEL_PREFIX)*") {
            throw "Runner route label must start with '$($env:ROUTE_LABEL_PREFIX)': $routeLabel"
          }

          $labels = @('self-hosted', 'windows', 'issue-agent-lock', $routeLabel)
          if ([string]::IsNullOrWhiteSpace($env:LOCK_RUNNER_GROUP)) {
            $lockRunsOn = $labels | ConvertTo-Json -Compress
          } else {
            $lockRunsOn = ([ordered]@{
              group = $env:LOCK_RUNNER_GROUP
              labels = $labels
            } | ConvertTo-Json -Compress)
          }

          "route_label=$routeLabel" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "lock_runs_on=$lockRunsOn" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "route_label=$routeLabel"
          Write-Host "lock_runs_on=$lockRunsOn"

  hold-lock-and-dispatch:
    name: "Hold lock and watch worker"
    needs: route
    if: needs.route.result == 'success'
    runs-on: ${{ fromJson(needs.route.outputs.lock_runs_on) }}
    timeout-minutes: 360
    env:
      GH_TOKEN: ${{ github.token }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      REPO_SLUG: ${{ github.repository }}
      ROUTE_LABEL: ${{ needs.route.outputs.route_label }}
      WORKER_WORKFLOW_FILE: issue-agent-worker.yml
    steps:
      - name: Dispatch worker and wait for completion
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:ISSUE_NUMBER)) { throw "No issue number was provided." }
          if ([string]::IsNullOrWhiteSpace($env:ROUTE_LABEL)) { throw "No route label was resolved." }

          $dispatchToken = "$($env:GITHUB_RUN_ID)-$($env:GITHUB_RUN_ATTEMPT)-$($env:ISSUE_NUMBER)"
          $targetTitle = "Issue Agent Worker #$($env:ISSUE_NUMBER) ($dispatchToken)"
          $lockUrl = "https://github.com/$($env:REPO_SLUG)/actions/runs/$($env:GITHUB_RUN_ID)"

          Write-Host "Dispatching $($env:WORKER_WORKFLOW_FILE) for issue #$($env:ISSUE_NUMBER) on $($env:ROUTE_LABEL)."
          & gh api --method POST "repos/$($env:REPO_SLUG)/actions/workflows/$($env:WORKER_WORKFLOW_FILE)/dispatches" `
            -f "ref=main" `
            -f "inputs[issue_number]=$($env:ISSUE_NUMBER)" `
            -f "inputs[route_label]=$($env:ROUTE_LABEL)" `
            -f "inputs[lock_run_id]=$($env:GITHUB_RUN_ID)" `
            -f "inputs[dispatch_token]=$dispatchToken"
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to dispatch $($env:WORKER_WORKFLOW_FILE)."
          }

          $workerRun = $null
          $findDeadline = (Get-Date).ToUniversalTime().AddMinutes(5)
          while ((Get-Date).ToUniversalTime() -lt $findDeadline) {
            $runsJson = & gh api "repos/$($env:REPO_SLUG)/actions/workflows/$($env:WORKER_WORKFLOW_FILE)/runs?event=workflow_dispatch&per_page=50"
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to list worker workflow runs."
            }

            $runs = ($runsJson | ConvertFrom-Json).workflow_runs
            $workerRun = @($runs | Where-Object { [string]$_.display_title -eq $targetTitle } | Sort-Object created_at -Descending | Select-Object -First 1)
            if ($workerRun.Count -gt 0) {
              $workerRun = $workerRun[0]
              break
            }

            Write-Host "Waiting for worker run '$targetTitle' to appear..."
            Start-Sleep -Seconds 15
          }

          if ($null -eq $workerRun -or [string]::IsNullOrWhiteSpace([string]$workerRun.id)) {
            throw "Dispatched worker run did not appear within 5 minutes: $targetTitle"
          }

          $workerRunId = [string]$workerRun.id
          $workerUrl = [string]$workerRun.html_url
          Write-Host "Worker run: $workerUrl"

          & gh api --method POST "repos/$($env:REPO_SLUG)/issues/$($env:ISSUE_NUMBER)/comments" `
            -f "body=Issue-agent worker run started: $workerUrl`nLock holder: $lockUrl" *> $null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Unable to comment with worker run link; continuing."
          }

          while ($true) {
            $runJson = & gh api "repos/$($env:REPO_SLUG)/actions/runs/$workerRunId"
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to read worker run $workerRunId."
            }

            $run = $runJson | ConvertFrom-Json
            $status = [string]$run.status
            $conclusion = [string]$run.conclusion
            Write-Host "Worker status: status=$status conclusion=$conclusion url=$workerUrl"

            if ($status -eq "completed") {
              if ($conclusion -eq "success") {
                Write-Host "Worker completed successfully."
                exit 0
              }

              throw "Worker completed with conclusion '$conclusion': $workerUrl"
            }

            Start-Sleep -Seconds 30
          }
