name: Issue Agent

on:
  issues:
    types:
      - reopened
      - labeled
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to hand to Claude
        required: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  run-issue-agent:
    name: Run Claude for one issue
    env:
      ISSUE_AGENT_CHECKOUT_PATH: issue-agent-src/${{ github.run_id }}-${{ github.run_attempt }}
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && (
        (github.event.action == 'labeled' && github.event.label.name == 'issue-agent') ||
        (github.event.action == 'reopened' && contains(github.event.issue.labels.*.name, 'issue-agent'))
      ))
    runs-on:
      - self-hosted
      - windows
      - issue-agent

    steps:
      - name: Prepare issue-agent runner workspace
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          if ([string]::IsNullOrWhiteSpace($workspace)) {
            throw "GITHUB_WORKSPACE is not set."
          }

          $checkoutRoot = Join-Path $workspace "issue-agent-src"
          New-Item -ItemType Directory -Force -Path $checkoutRoot | Out-Null

          function Stop-RunnerBuildProcesses {
            param(
              [Parameter(Mandatory = $true)][string]$WorkspacePath,
              [Parameter(Mandatory = $true)][string]$CheckoutRootPath
            )

            $processIds = New-Object 'System.Collections.Generic.HashSet[int]'
            $hints = @(
              $WorkspacePath,
              $CheckoutRootPath,
              $env:RUNNER_WORKSPACE,
              "issue-agent-build",
              "SpireLens.Core.dll"
            ) | Where-Object { -not [string]::IsNullOrWhiteSpace($_) }

            Get-CimInstance Win32_Process | Where-Object {
              $_.Name -in @('dotnet.exe', 'testhost.exe', 'vstest.console.exe')
            } | ForEach-Object {
              $commandLine = [string]$_.CommandLine
              foreach ($hint in $hints) {
                if ($commandLine -like "*$hint*") {
                  [void]$processIds.Add([int]$_.ProcessId)
                  break
                }
              }
            }

            foreach ($processId in $processIds) {
              try {
                $process = Get-Process -Id $processId -ErrorAction Stop
                Write-Host "Stopping stale runner build process $($process.ProcessName) ($processId)."
                Stop-Process -Id $processId -Force -ErrorAction Stop
              } catch {
                Write-Warning "Unable to stop process ${processId}: $($_.Exception.Message)"
              }
            }

            if ($processIds.Count -gt 0) {
              Start-Sleep -Seconds 3
            }
          }

          Stop-RunnerBuildProcesses -WorkspacePath $workspace -CheckoutRootPath $checkoutRoot

          Get-ChildItem -LiteralPath $checkoutRoot -Directory -ErrorAction SilentlyContinue |
            Where-Object { $_.LastWriteTimeUtc -lt (Get-Date).ToUniversalTime().AddDays(-2) } |
            ForEach-Object {
              try {
                Write-Host "Removing stale checkout folder '$($_.FullName)'."
                Remove-Item -LiteralPath $_.FullName -Recurse -Force -ErrorAction Stop
              } catch {
                Write-Warning "Unable to remove stale checkout folder '$($_.FullName)': $($_.Exception.Message)"
              }
            }

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: ${{ env.ISSUE_AGENT_CHECKOUT_PATH }}

      - name: Resolve issue-agent host paths
        env:
          CONFIGURED_CLAUDE_CLI_PATH: ${{ vars.ISSUE_AGENT_CLAUDE_CLI_PATH }}
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $candidates = @()

          if (-not [string]::IsNullOrWhiteSpace($env:CONFIGURED_CLAUDE_CLI_PATH)) {
            $candidates += $env:CONFIGURED_CLAUDE_CLI_PATH
          }

          $candidates += @(
            'D:\automation\claude-code\node_modules\@anthropic-ai\claude-code\bin\claude.exe',
            'C:\automation\claude-code\node_modules\@anthropic-ai\claude-code\bin\claude.exe',
            (Join-Path $env:USERPROFILE 'automation\claude-code\node_modules\@anthropic-ai\claude-code\bin\claude.exe')
          )

          $claudePath = $candidates |
            Where-Object { -not [string]::IsNullOrWhiteSpace($_) -and (Test-Path -LiteralPath $_) } |
            Select-Object -First 1

          if (-not $claudePath) {
            throw "Claude Code CLI was not found. Set repository variable ISSUE_AGENT_CLAUDE_CLI_PATH or install Claude under one of the documented default locations."
          }

          $repoRoot = Join-Path $env:GITHUB_WORKSPACE $env:ISSUE_AGENT_CHECKOUT_PATH
          if (-not (Test-Path -LiteralPath $repoRoot)) {
            throw "Issue-agent checkout was not found at '$repoRoot'."
          }

          $buildRoot = Join-Path $env:RUNNER_TEMP ("issue-agent-build\$($env:GITHUB_RUN_ID)-$($env:GITHUB_RUN_ATTEMPT)")
          New-Item -ItemType Directory -Force -Path $buildRoot | Out-Null

          "CLAUDE_CLI_PATH=$claudePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ISSUE_AGENT_REPO_ROOT=$repoRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ISSUE_AGENT_BUILD_ROOT=$buildRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append


      - name: Refresh SpireLens MCP checkout
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $mcpRoot = "D:\repos\spire-lens-mcp"
          $mcpRepo = "https://github.com/nelsong6/spire-lens-mcp.git"

          if (Test-Path -LiteralPath (Join-Path $mcpRoot ".git")) {
            git -C $mcpRoot fetch --prune origin main
            git -C $mcpRoot checkout main
            git -C $mcpRoot pull --ff-only origin main
          } else {
            $parent = Split-Path -Parent $mcpRoot
            New-Item -ItemType Directory -Force -Path $parent | Out-Null
            git clone $mcpRepo $mcpRoot
          }

          if ($LASTEXITCODE -ne 0) {
            throw "Unable to refresh SpireLens MCP checkout at '$mcpRoot'."
          }

          uv run --directory (Join-Path $mcpRoot "mcp") python -m py_compile server.py

          $gameDir = "D:\SteamLibrary\steamapps\common\Slay the Spire 2"
          $buildScript = Join-Path $mcpRoot "build.ps1"
          if (-not (Test-Path -LiteralPath $buildScript)) {
            throw "SpireLens MCP build script was not found at '$buildScript'."
          }

          & $buildScript -GameDir $gameDir -Configuration Release
          if ($LASTEXITCODE -ne 0) {
            throw "SpireLens MCP build failed."
          }

          $modsDir = Join-Path $gameDir "mods"
          New-Item -ItemType Directory -Force -Path $modsDir | Out-Null
          Copy-Item -LiteralPath (Join-Path $mcpRoot "out\SpireLensMcp\SpireLensMcp.dll") -Destination (Join-Path $modsDir "SpireLensMcp.dll") -Force
          Copy-Item -LiteralPath (Join-Path $mcpRoot "mod_manifest.json") -Destination (Join-Path $modsDir "SpireLensMcp.json") -Force
      - name: Restart STS2 for clean issue-agent baseline
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $repoRoot = $env:ISSUE_AGENT_REPO_ROOT
          if ([string]::IsNullOrWhiteSpace($repoRoot)) {
            $repoRoot = Join-Path $env:GITHUB_WORKSPACE $env:ISSUE_AGENT_CHECKOUT_PATH
          }

          $scriptPath = Join-Path $repoRoot ".github\scripts\restart-sts2.ps1"
          if (-not (Test-Path -LiteralPath $scriptPath)) {
            throw "STS2 restart script was not found at '$scriptPath'."
          }

          & $scriptPath `
            -Mode Restart `
            -McpConfigPath (Join-Path $repoRoot ".mcp.json") `
            -StartupTimeoutSeconds 60 `
            -ShutdownTimeoutSeconds 45

      - name: Load Anthropic API key from local runner file
        env:
          CONFIGURED_ANTHROPIC_KEY_PATH: ${{ vars.ISSUE_AGENT_ANTHROPIC_KEY_PATH }}
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $keyPath = $env:CONFIGURED_ANTHROPIC_KEY_PATH
          if ([string]::IsNullOrWhiteSpace($keyPath)) {
            $keyPath = 'C:\ProgramData\SpireLens\anthropic-api-key.txt'
          }

          if (-not (Test-Path -LiteralPath $keyPath)) {
            throw "Anthropic API key file was not found at '$keyPath'. Run the Key Vault bootstrap script on this runner or set repository variable ISSUE_AGENT_ANTHROPIC_KEY_PATH."
          }

          $anthropicApiKey = (Get-Content -LiteralPath $keyPath -Raw).Trim()
          if ([string]::IsNullOrWhiteSpace($anthropicApiKey)) {
            throw "Anthropic API key file '$keyPath' is empty."
          }

          Write-Host "::add-mask::$anthropicApiKey"
          "ANTHROPIC_API_KEY=$anthropicApiKey" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Run phased Claude issue agent
        timeout-minutes: 25
        env:
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          GH_TOKEN: ${{ github.token }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
          DISPATCH_ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
          REPO_SLUG: ${{ github.repository }}
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:ANTHROPIC_API_KEY)) {
            throw "ANTHROPIC_API_KEY was not loaded from the local runner file."
          }
          if ([string]::IsNullOrWhiteSpace($env:CLAUDE_CLI_PATH) -or -not (Test-Path -LiteralPath $env:CLAUDE_CLI_PATH)) {
            throw "Claude Code CLI was not found at '$env:CLAUDE_CLI_PATH'."
          }

          $issueNumber = $env:EVENT_ISSUE_NUMBER
          if ([string]::IsNullOrWhiteSpace($issueNumber)) {
            $issueNumber = $env:DISPATCH_ISSUE_NUMBER
          }
          if ([string]::IsNullOrWhiteSpace($issueNumber)) {
            throw "No issue number was provided by the event or workflow_dispatch input."
          }

          $repoRoot = $env:ISSUE_AGENT_REPO_ROOT
          if ([string]::IsNullOrWhiteSpace($repoRoot)) {
            $repoRoot = Join-Path $env:GITHUB_WORKSPACE $env:ISSUE_AGENT_CHECKOUT_PATH
          }
          if (-not (Test-Path -LiteralPath $repoRoot)) {
            throw "Issue-agent checkout was not found at '$repoRoot'."
          }

          $mcpConfig = Join-Path $repoRoot ".mcp.json"
          if (-not (Test-Path -LiteralPath $mcpConfig)) {
            throw "MCP config was not found at '$mcpConfig'."
          }

          $scriptPath = Join-Path $repoRoot ".github\scripts\run-issue-agent-phases.ps1"
          if (-not (Test-Path -LiteralPath $scriptPath)) {
            throw "Phased issue-agent script was not found at '$scriptPath'."
          }

          & $scriptPath `
            -IssueNumber $issueNumber `
            -RepoSlug $env:REPO_SLUG `
            -RepoRoot $repoRoot `
            -ClaudeCliPath $env:CLAUDE_CLI_PATH `
            -McpConfigPath $mcpConfig `
            -StreamLogPath (Join-Path $env:RUNNER_TEMP "claude-issue-agent-events.jsonl") `
            -DebugLogPath (Join-Path $env:RUNNER_TEMP "claude-issue-agent-debug.log") `
            -SummaryLogPath (Join-Path $env:RUNNER_TEMP "claude-issue-agent-summary.log") `
            -ScreenshotDir (Join-Path $env:RUNNER_TEMP "sts2-screenshots") `
            -ValidationArtifactDir (Join-Path $env:RUNNER_TEMP "sts2-artifacts")
      - name: Upload Claude agent logs and STS2 validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-issue-agent-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/claude-issue-agent-*.jsonl
            ${{ runner.temp }}/claude-issue-agent-*.log
            ${{ runner.temp }}/sts2-screenshots/**/*.png
            ${{ runner.temp }}/sts2-artifacts/**/*

      - name: Summarize issue-agent run
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
          DISPATCH_ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
          REPO_SLUG: ${{ github.repository }}
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $issueNumber = $env:EVENT_ISSUE_NUMBER
          if ([string]::IsNullOrWhiteSpace($issueNumber)) {
            $issueNumber = $env:DISPATCH_ISSUE_NUMBER
          }

          $repoRoot = $env:ISSUE_AGENT_REPO_ROOT
          if ([string]::IsNullOrWhiteSpace($repoRoot)) {
            $repoRoot = Join-Path $env:GITHUB_WORKSPACE $env:ISSUE_AGENT_CHECKOUT_PATH
          }

          $scriptPath = Join-Path $repoRoot ".github\scripts\summarize-issue-agent.ps1"
          if (-not (Test-Path -LiteralPath $scriptPath)) {
            throw "Issue-agent summary script was not found at '$scriptPath'."
          }

          & $scriptPath `
            -EventLogPath (Join-Path $env:RUNNER_TEMP "claude-issue-agent-events.jsonl") `
            -SummaryLogPath (Join-Path $env:RUNNER_TEMP "claude-issue-agent-summary.log") `
            -DebugLogPath (Join-Path $env:RUNNER_TEMP "claude-issue-agent-debug.log") `
            -ScreenshotDir (Join-Path $env:RUNNER_TEMP "sts2-screenshots") `
            -ValidationArtifactDir (Join-Path $env:RUNNER_TEMP "sts2-artifacts") `
            -ArtifactName "claude-issue-agent-$($env:GITHUB_RUN_ID)" `
            -RepoSlug $env:REPO_SLUG `
            -RunId $env:GITHUB_RUN_ID `
            -IssueNumber $issueNumber `
            -HeadSha $env:GITHUB_SHA `
            -RefName $env:GITHUB_REF_NAME

      - name: Stop STS2 after issue-agent run
        if: always()
        continue-on-error: true
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $repoRoot = $env:ISSUE_AGENT_REPO_ROOT
          if ([string]::IsNullOrWhiteSpace($repoRoot)) {
            $repoRoot = Join-Path $env:GITHUB_WORKSPACE $env:ISSUE_AGENT_CHECKOUT_PATH
          }

          $scriptPath = Join-Path $repoRoot ".github\scripts\restart-sts2.ps1"
          if (-not (Test-Path -LiteralPath $scriptPath)) {
            Write-Warning "STS2 restart script was not found at '$scriptPath'."
            return
          }

          & $scriptPath `
            -Mode Stop `
            -McpConfigPath (Join-Path $repoRoot ".mcp.json") `
            -ShutdownTimeoutSeconds 45
      - name: Stop issue-agent runner build processes
        if: always()
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          if ([string]::IsNullOrWhiteSpace($workspace)) {
            $workspace = "C:\actions-runner-spirelens\_work\spirelens"
          }

          $checkoutRoot = Join-Path $workspace "issue-agent-src"
          $buildRoot = $env:ISSUE_AGENT_BUILD_ROOT

          $hints = @(
            $checkoutRoot,
            $buildRoot,
            "issue-agent-build",
            "SpireLens.Core.dll"
          ) | Where-Object { -not [string]::IsNullOrWhiteSpace($_) }

          Get-CimInstance Win32_Process | Where-Object {
            $_.Name -in @('dotnet.exe', 'testhost.exe', 'vstest.console.exe')
          } | ForEach-Object {
            $commandLine = [string]$_.CommandLine
            foreach ($hint in $hints) {
              if ($commandLine -like "*$hint*") {
                Write-Host "Stopping stale runner build process $($_.Name) ($($_.ProcessId)) after issue-agent run."
                Stop-Process -Id $_.ProcessId -Force -ErrorAction SilentlyContinue
                break
              }
            }
          }
